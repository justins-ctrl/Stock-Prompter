<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Prompter Pro</title>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 95%;
  max-width: 900px;
  padding: 40px;
}

h1 {
  text-align: center;
  color: #00ffcc;
  font-size: 32px;
}

label {
  font-size: 18px;
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 6px;
  border: none;
  box-sizing: border-box;
}

button {
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

#result {
  margin-top: 30px;
  padding: 25px;
  background: #1a1a1a;
  border-radius: 10px;
  font-size: 18px;
}

.warning { color: orange; font-weight: bold; }
.danger { color: red; font-weight: bold; }
.bullish { color: lime; font-weight: bold; }
.bearish { color: red; font-weight: bold; }

.mode {
  text-align: center;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="container">

<h1>Trade Prompter Pro</h1>

<div class="mode">
Mode:
<select id="mode">
  <option value="live">Live Market</option>
  <option value="sim">Simulator</option>
</select>
</div>

<label>Ticker Symbol:</label>
<input id="ticker" placeholder="AAPL" />

<label>Account Size ($):</label>
<input id="accountSize" type="number" placeholder="1000" />

<label>Expiration Preference:</label>
<select id="expiry">
  <option value="weekly">Weekly (0-7 days)</option>
  <option value="biweekly">Bi-Weekly (7-14 days)</option>
</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

</div>

<script>

async function getLivePrice(ticker) {
  try {
    const response = await fetch(
      `https://financialmodelingprep.com/api/v3/quote/${ticker}?apikey=demo`
    );
    const data = await response.json();
    if (data && data.length > 0) {
      return data[0].price;
    }
  } catch (e) {
    return null;
  }
  return null;
}

function simulatePrice() {
  return 100 + Math.random() * 50;
}

async function analyze() {

  const ticker = document.getElementById("ticker").value.toUpperCase();
  const account = parseFloat(document.getElementById("accountSize").value);
  const expiry = document.getElementById("expiry").value;
  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  if (!ticker || !account) {
    result.innerHTML = "Please enter ticker and account size.";
    return;
  }

  result.innerHTML = "Analyzing...";

  let price = null;

  if (mode === "live") {
    price = await getLivePrice(ticker);
  }

  if (!price) {
    price = simulatePrice();
    result.innerHTML = "<p class='warning'>Live data unavailable. Using simulator.</p>";
  }

  const movePercent = expiry === "weekly" ? 0.04 : 0.07;
  const expectedMove = price * movePercent;
  const upperRange = price + expectedMove;
  const lowerRange = price - expectedMove;

  const bias = price % 2 === 0 ? "Bullish" : "Bearish";

  const suggestedStrike = bias === "Bullish"
      ? price + 2
      : price - 2;

  const optionCost = price * 0.05;

  const breakeven = bias === "Bullish"
      ? suggestedStrike + optionCost
      : suggestedStrike - optionCost;

  const percentMoveNeeded = Math.abs((breakeven - price) / price * 100);
  const maxRisk = account * 0.10;

  let riskWarning = "";
  if (optionCost > maxRisk) {
      riskWarning = "<p class='danger'>⚠ Position exceeds 10% account risk.</p>";
  }

  let strikeWarning = "";
  if (bias === "Bullish" && suggestedStrike > upperRange) {
      strikeWarning = "<p class='warning'>⚠ Strike outside expected move.</p>";
  }
  if (bias === "Bearish" && suggestedStrike < lowerRange) {
      strikeWarning = "<p class='warning'>⚠ Strike outside expected move.</p>";
  }

  result.innerHTML += `
      <h2>${ticker}</h2>
      <p>Price: $${price.toFixed(2)}</p>
      <p>Bias: <span class="${bias === "Bullish" ? "bullish" : "bearish"}">${bias}</span></p>

      <hr>

      <p><b>Expected Move (${expiry}):</b> ±$${expectedMove.toFixed(2)}</p>
      <p>Projected Range: $${lowerRange.toFixed(2)} - $${upperRange.toFixed(2)}</p>

      <hr>

      <p><b>Suggested Strike:</b> $${suggestedStrike.toFixed(2)}</p>
      <p><b>Est. Option Cost:</b> $${optionCost.toFixed(2)}</p>
      <p><b>Breakeven:</b> $${breakeven.toFixed(2)}</p>
      <p><b>% Move Required:</b> ${percentMoveNeeded.toFixed(2)}%</p>

      ${strikeWarning}
      ${riskWarning}
  `;
}

</script>

</body>
</html>
