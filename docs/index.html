<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Prompter Pro</title>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 95%;
  max-width: 850px;
  padding: 30px;
}

h1 {
  text-align: center;
  color: #00ffcc;
}

input, select, button {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  font-size: 18px;
  border-radius: 8px;
  border: none;
  box-sizing: border-box;
}

button {
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

#result {
  margin-top: 25px;
  padding: 20px;
  background: #1a1a1a;
  border-radius: 10px;
  font-size: 18px;
}

.bullish { color: lime; font-weight: bold; }
.bearish { color: red; font-weight: bold; }
.warning { color: orange; font-weight: bold; }
.strong { color: #00ffcc; font-weight: bold; }
</style>
</head>
<body>

<div class="container">

<h1>Trade Prompter Pro</h1>

<label>Ticker Symbol:</label>
<input id="ticker" placeholder="AAPL" />

<label>Account Size ($):</label>
<input id="accountSize" type="number" placeholder="1000" />

<label>Expiration:</label>
<select id="expiry">
  <option value="weekly">Weekly</option>
  <option value="biweekly">Bi-Weekly</option>
</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

</div>

<script>

const API_KEY = "OHCJWFQEFSXI8IJ3.";

async function getHistorical(ticker) {
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&apikey=${API_KEY}`;
  const response = await fetch(url);
  const data = await response.json();
  return data["Time Series (Daily)"];
}

function calculateRSI(closes, period = 14) {
  let gains = 0, losses = 0;

  for (let i = 1; i <= period; i++) {
    const diff = closes[i-1] - closes[i];
    if (diff > 0) gains += diff;
    else losses -= diff;
  }

  const avgGain = gains / period;
  const avgLoss = losses / period;

  if (avgLoss === 0) return 100;

  const rs = avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

async function analyze() {

  const ticker = document.getElementById("ticker").value.toUpperCase();
  const account = parseFloat(document.getElementById("accountSize").value);
  const expiry = document.getElementById("expiry").value;
  const result = document.getElementById("result");

  if (!ticker || !account) {
    result.innerHTML = "Enter ticker and account size.";
    return;
  }

  result.innerHTML = "Analyzing...";

  const rawData = await getHistorical(ticker);

  if (!rawData) {
    result.innerHTML = "<span class='warning'>Invalid symbol or API limit reached.</span>";
    return;
  }

  const dates = Object.keys(rawData).slice(0, 30);
  const closes = dates.map(date => parseFloat(rawData[date]["4. close"]));
  const highs = dates.map(date => parseFloat(rawData[date]["2. high"]));
  const lows = dates.map(date => parseFloat(rawData[date]["3. low"]));

  const currentPrice = closes[0];
  const ma20 = closes.slice(0, 20).reduce((a,b)=>a+b,0) / 20;
  const momentum5 = ((closes[0] - closes[5]) / closes[5]) * 100;
  const rsi = calculateRSI(closes);

  const avgRange = highs.slice(0, 14).reduce((sum, h, i) => sum + (h - lows[i]), 0) / 14;
  const volatilityPercent = (avgRange / currentPrice) * 100;

  const choppy = Math.abs(momentum5) < 1 && Math.abs(currentPrice - ma20) < (avgRange * 0.5);

  let score = 50;
  let bias = "WAIT";

  if (!choppy) {

    if (currentPrice > ma20 && momentum5 > 0 && rsi < 70) {
      bias = "CALL";
      score += 30;
    }

    if (currentPrice < ma20 && momentum5 < 0 && rsi > 30) {
      bias = "PUT";
      score += 30;
    }

    if (Math.abs(momentum5) > 2) score += 10;
    if (volatilityPercent > 2) score += 10;
  }

  if (score > 100) score = 100;

  let confidence;
  if (score >= 85) confidence = "High";
  else if (score >= 70) confidence = "Moderate";
  else if (score >= 55) confidence = "Low";
  else confidence = "Very Low";

  let recommendation;
  if (score >= 85)
      recommendation = `Strong ${bias}`;
  else if (score >= 70)
      recommendation = `${bias} — Acceptable`;
  else
      recommendation = "Wait for Better Setup";

  const movePercent = expiry === "weekly" ? 0.04 : 0.07;
  const expectedMove = currentPrice * movePercent;

  const strikeDistance = avgRange;
  const strike = bias === "CALL"
      ? currentPrice + strikeDistance
      : currentPrice - strikeDistance;

  result.innerHTML = `
      <h2>${ticker}</h2>
      <p>Price: $${currentPrice.toFixed(2)}</p>
      <hr>
      <p>20 Day MA: $${ma20.toFixed(2)}</p>
      <p>5 Day Momentum: ${momentum5.toFixed(2)}%</p>
      <p>RSI: ${rsi.toFixed(1)}</p>
      <p>Volatility: ${volatilityPercent.toFixed(2)}%</p>
      <hr>
      <p><b>Bias:</b> 
        <span class="${bias === "CALL" ? "bullish" : bias === "PUT" ? "bearish" : "warning"}">
        ${bias}
        </span>
      </p>
      <p><b>Suggested Strike (Volatility Based):</b> $${strike.toFixed(2)}</p>
      <p><b>Expected Move:</b> ±$${expectedMove.toFixed(2)}</p>
      <hr>
      <p><b>Trade Score:</b> ${score}/100</p>
      <p><b>Confidence:</b> ${confidence}</p>
      <p class="strong"><b>Recommendation:</b> ${recommendation}</p>
  `;
}

</script>

</body>
</html>
