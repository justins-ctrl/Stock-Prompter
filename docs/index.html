<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Prompter Elite</title>

<style>
body{
background:#0e1117;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

h1{
color:#22c55e;
font-size:36px;
margin-bottom:30px;
}

input,select,button{
width:100%;
padding:18px;
margin-top:12px;
border-radius:10px;
border:none;
font-size:18px;
}

input,select{
background:#161b22;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#161b22;
padding:22px;
margin-top:25px;
border-radius:14px;
font-size:18px;
}

.bullish{color:#22c55e;font-weight:bold;}
.bearish{color:#ef4444;font-weight:bold;}
.neutral{color:#9ca3af;font-weight:bold;}

.gradeA{color:#00ffc3;font-weight:bold;}
.gradeB{color:#facc15;font-weight:bold;}
.gradeC{color:#9ca3af;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<h1>Trade Prompter Elite</h1>

<input id="ticker" placeholder="Ticker (SPY, AAPL, TSLA)">
<input id="account" type="number" placeholder="Account Size ($)">

<select id="expiry">
<option value="0dte">0DTE</option>
<option value="weekly">Weekly</option>
<option value="biweekly">Bi-Weekly</option>
</select>

<button onclick="analyze()">Scan Trade</button>

<div id="results"></div>

</div>

<script>

const API_KEY="YOUR_ALPHA_KEY";

async function fetchData(symbol){

const url=`https://www.alphavantage.co/query?function=TIME_SERIES_INTRADAY&symbol=${symbol}&interval=5min&apikey=${API_KEY}`;

const r=await fetch(url);
const data=await r.json();

const series=data["Time Series (5min)"];

if(!series) throw "No data";

let prices=[];
let volumes=[];

for(let t in series){
prices.push(parseFloat(series[t]["4. close"]));
volumes.push(parseFloat(series[t]["5. volume"]));
}

return {prices,volumes};

}

function calculateRSI(prices){

let gains=0;
let losses=0;

for(let i=1;i<14;i++){

let diff=prices[i]-prices[i-1];

if(diff>0)gains+=diff;
else losses+=Math.abs(diff);

}

let rs=gains/(losses||1);

return 100-(100/(1+rs));

}

function grade(conf){

if(conf>80) return {grade:"A+",class:"gradeA"};
if(conf>70) return {grade:"A",class:"gradeA"};
if(conf>60) return {grade:"B",class:"gradeB"};

return {grade:"C",class:"gradeC"};

}

async function analyze(){

const ticker=document.getElementById("ticker").value.toUpperCase().trim();
const account=Number(document.getElementById("account").value||5000);
const expiry=document.getElementById("expiry").value;

const results=document.getElementById("results");

results.innerHTML="Scanning market...";

try{

const {prices,volumes}=await fetchData(ticker);

const current=prices[0];
const open=prices[prices.length-1];

const change=((current-open)/open)*100;

const rsi=calculateRSI(prices);

const avgVol=volumes.reduce((a,b)=>a+b)/volumes.length;

const volSpike=volumes[0]>(avgVol*1.5);

let direction="WAIT";
let cls="neutral";

if(change>0.4 && rsi<70){
direction="CALL";
cls="bullish";
}

else if(change<-0.4 && rsi>30){
direction="PUT";
cls="bearish";
}

let confidence=Math.abs(change)*40;

if(volSpike) confidence+=20;

confidence+=50-Math.abs(50-rsi);

confidence=Math.min(100,Math.round(confidence));

let action="WAIT";

if(confidence>75 && direction!=="WAIT") action="ENTER";

let g=grade(confidence);

let expectedMove=(current*0.02).toFixed(2);

let callStrike;
let putStrike;

if(expiry==="0dte"){
callStrike=Math.round(current);
putStrike=Math.round(current);
}

if(expiry==="weekly"){
callStrike=Math.round(current+1);
putStrike=Math.round(current-1);
}

if(expiry==="biweekly"){
callStrike=Math.round(current+2);
putStrike=Math.round(current-2);
}

let risk=account*0.02;

let contractCost=current*0.1;

let contracts=Math.max(1,Math.floor(risk/contractCost));

results.innerHTML=
`<div class="card">

<strong>${ticker}</strong><br><br>

Price: $${current.toFixed(2)}<br>
Move: ${change.toFixed(2)}%

<br><br>

AI Direction: <span class="${cls}">${direction}</span><br>

Confidence: ${confidence}%<br>

Trade Rating: <span class="${g.class}">${g.grade}</span>

<br><br>

Action: <strong>${action}</strong>

<br><br>

Expected Move: $${expectedMove}

<br><br>

Suggested CALL Strike: $${callStrike}<br>
Suggested PUT Strike: $${putStrike}

<br><br>

Suggested Contracts: ${contracts}<br>
Max Risk: $${risk.toFixed(2)}

<br><br>

RSI: ${rsi.toFixed(1)}<br>
Volume Spike: ${volSpike?"Yes":"No"}

</div>`;

}

catch(e){

results.innerHTML="<div class='card'>Data unavailable or API limit reached</div>";

}

}

</script>

</body>
</html>
