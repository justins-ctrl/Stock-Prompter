<!DOCTYPE html>
<html>
<head>
<title>AI Options Terminal V31</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#071326;color:white;margin:0;padding:20px;}
.container{max-width:520px;margin:auto;}
.card{background:#13233d;padding:18px;border-radius:12px;margin-top:15px;}
input{width:100%;padding:14px;border-radius:10px;border:none;margin-top:10px;font-size:18px;}
button{width:100%;padding:16px;border-radius:12px;border:none;background:#3a8bfd;color:white;font-size:18px;margin-top:12px;}
</style>
</head>

<body>
<div class="container">

<div class="card">AI MARKET DASHBOARD<br><br>Momentum Monitor Active</div>

<input id="ticker" placeholder="Enter Stock Ticker">
<button onclick="runAI()">Run AI Analysis</button>
<button onclick="scanMarket()">Scan Top Opportunities</button>

<div id="output"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3"
const watchlist=["SPY","NVDA","TSLA","QQQ","AAPL","AMD","META","NFLX","AMZN","COIN"]

async function getData(symbol){
let url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`
let r=await fetch(url)
let d=await r.json()
let s=d["Time Series (Daily)"]
if(!s) return null
return Object.values(s).slice(0,60).map(v=>parseFloat(v["4. close"]))
}

function analyze(closes){

let price=closes[0]
let avg20=closes.slice(0,20).reduce((a,b)=>a+b)/20
let avg50=closes.slice(0,50).reduce((a,b)=>a+b)/50
let momentum=(price-closes[5])/closes[5]

let bias = price>avg20&&avg20>avg50?"Bullish":price<avg20&&avg20<avg50?"Bearish":"Neutral"
let direction = momentum>.02&&bias=="Bullish"?"BUY CALL":momentum<-.02&&bias=="Bearish"?"BUY PUT":"WAIT"

let confidence=Math.abs(momentum)>.05?"High":Math.abs(momentum)>.03?"Medium":"Low"

let expectedMove=price*0.04
let atm=Math.round(price)
let premium=atm*0.015

let breakeven=(direction==="BUY PUT")?atm-premium:atm+premium
let dist=Math.abs(breakeven-price)

let pop=Math.max(30,Math.min(90,Math.round(70-(dist/expectedMove*20))))

let edge=expectedMove>dist*1.2?"Favorable":expectedMove<dist?"Risky":"Neutral"
let theta=edge==="Risky"?"High":"Low"

let volatility="NORMAL"
let range5=Math.max(...closes.slice(0,5))-Math.min(...closes.slice(0,5))
let range20=Math.max(...closes.slice(0,20))-Math.min(...closes.slice(0,20))
if(range5>range20*.4) volatility="EXPANSION LIKELY"
if(range5<range20*.2) volatility="COMPRESSION"

let regime=volatility==="EXPANSION LIKELY"&&Math.abs(momentum)>.03?"BREAKOUT":Math.abs(momentum)>.02?"TREND":"RANGE"

let expiration="5-10 Days"
if(confidence==="High"&&theta==="Low") expiration="3-5 Days (Weekly)"
if(theta==="High") expiration="10-14 Days (Bi-Weekly)"

let score=50+(bias!=="Neutral"?10:0)+(confidence==="High"?20:0)+(edge==="Favorable"?15:0)+(volatility==="EXPANSION LIKELY"?10:0)
score=Math.min(100,score)

let grade=score>90?"A+":score>80?"A":score>70?"B":"C"

/////////////////////////
// 🚫 TRADE FILTER (NEW)
/////////////////////////

let tradeFilter="PASS"
if(grade==="C"||direction==="WAIT"){
tradeFilter="FAIL"
}

/////////////////////////
// 💰 POSITION SIZING
/////////////////////////

let contracts=1
let allocation="5%"
let risk="Low"

if(grade==="A+"&&confidence==="High"){
contracts=5
allocation="25%"
risk="High"
}
else if(grade==="A"){
contracts=3
allocation="18%"
risk="Moderate"
}
else if(grade==="B"){
contracts=2
allocation="10%"
risk="Moderate"
}
else{
contracts=0
allocation="0%"
risk="Avoid"
}

/////////////////////////
// OTM ENGINE
/////////////////////////

let otmStrike="-",otmDistance="-",otmGrade="-",profitPotential="-"

if(direction!=="WAIT"){
let move=expectedMove*0.5
if(direction==="BUY CALL"){
otmStrike=Math.round(price+move)
otmDistance=((otmStrike-price)/price*100).toFixed(1)
}else{
otmStrike=Math.round(price-move)
otmDistance=((price-otmStrike)/price*100).toFixed(1)
}
profitPotential=Math.min(200,Math.round((expectedMove/premium)*100))
otmGrade=profitPotential>120?"A":profitPotential>80?"B":"C"
}

/////////////////////////
// EXIT AI
/////////////////////////

let optimalExit=confidence==="High"?"+65%":"+50%"
let runnerTarget=confidence==="High"?"+120%":"+100%"
let thetaKill=theta==="High"?"1 Day":"2-3 Days"

/////////////////////////
// LIQUIDITY
/////////////////////////

let liquidity=price>50?"High":price<15?"Low":"Moderate"
let spreadRisk=price>50?"Low":price<15?"High":"Medium"
let executionGrade=price>50?"A":price<15?"C":"B"

return{
price:price.toFixed(2),bias,direction,confidence,score,grade,
strike:atm,pop,expiration,
breakeven:breakeven.toFixed(2),dist:dist.toFixed(2),
expectedMove:expectedMove.toFixed(2),edge,theta,
otmStrike,otmDistance,otmGrade,profitPotential,
optimalExit,runnerTarget,thetaKill,
liquidity,spreadRisk,executionGrade,
tradeFilter,contracts,allocation,risk
}
}

async function runAI(){

let ticker=document.getElementById("ticker").value.toUpperCase()
let output=document.getElementById("output")

output.innerHTML="Analyzing..."

let closes=await getData(ticker)
if(!closes){output.innerHTML="No Data";return}

let a=analyze(closes)

output.innerHTML=`<div class="card">

<b>AI TRADE SETUP</b><br><br>

Ticker: ${ticker}<br>
Price: $${a.price}<br>
Market Bias: ${a.bias}<br><br>

Direction: ${a.direction}<br>
Confidence: ${a.confidence}<br>
Trade Score: ${a.score}/100 (${a.grade})<br>
Trade Filter: ${a.tradeFilter}<br><br>

Suggested Contracts: ${a.contracts}<br>
Capital Allocation: ${a.allocation}<br>
Risk Level: ${a.risk}<br><br>

Best Strike: ${a.strike}<br>
POP: ${a.pop}%<br>
Expiration: ${a.expiration}<br><br>

Best OTM Strike: ${a.otmStrike}<br>
OTM Distance: ${a.otmDistance}%<br>
OTM Grade: ${a.otmGrade}<br>
Profit Potential: +${a.profitPotential}%<br><br>

Breakeven: $${a.breakeven}<br>
Distance to BE: $${a.dist}<br>
Expected Move: $${a.expectedMove}<br>
Edge: ${a.edge}<br>
Theta Risk: ${a.theta}<br><br>

Optimal Exit: ${a.optimalExit}<br>
Runner Target: ${a.runnerTarget}<br>
Theta Kill Zone: ${a.thetaKill}<br><br>

Liquidity: ${a.liquidity}<br>
Spread Risk: ${a.spreadRisk}<br>
Execution Quality: ${a.executionGrade}

</div>`
}

async function scanMarket(){

let output=document.getElementById("output")
output.innerHTML="Scanning..."

let results=[]

for(let i=0;i<watchlist.length;i++){
let closes=await getData(watchlist[i])
if(!closes) continue
let a=analyze(closes)

if(a.tradeFilter==="PASS"){
results.push({ticker:watchlist[i],score:a.score})
}

await new Promise(r=>setTimeout(r,15000))
}

results.sort((a,b)=>b.score-a.score)
results=results.slice(0,2)

if(results.length===0){
output.innerHTML="No A/B setups found"
return
}

let text="<div class='card'><b>Top A/B Opportunities</b><br><br>"
results.forEach(r=>{text+=`${r.ticker} — Score ${r.score}<br>`})
text+="</div>"

output.innerHTML=text
}

</script>

</body>
</html>
