<!DOCTYPE html>
<html>

<head>

<title>AI Options Terminal V24</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#071326;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

h1{
text-align:center;
}

.card{
background:#13233d;
padding:18px;
border-radius:12px;
margin-top:15px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
margin-top:10px;
font-size:18px;
}

button{
width:100%;
padding:16px;
border-radius:12px;
border:none;
background:#3a8bfd;
color:white;
font-size:18px;
margin-top:12px;
}

</style>
</head>

<body>

<div class="container">

<h1>AI Options Terminal V24</h1>

<div class="card">
AI MARKET DASHBOARD<br><br>
Momentum Monitor Active
</div>

<input id="ticker" placeholder="Enter Stock Ticker">

<button onclick="runAI()">Run AI Analysis</button>

<button onclick="scanMarket()">Scan Top Opportunities</button>

<div id="output"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3"

const watchlist=[
"SPY","NVDA","TSLA","QQQ","AAPL","AMD","META","NFLX","AMZN","COIN"
]

async function getData(symbol){

let url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`

let r=await fetch(url)

let d=await r.json()

let s=d["Time Series (Daily)"]

if(!s) return null

let closes=Object.values(s)
.slice(0,60)
.map(v=>parseFloat(v["4. close"]))

return closes

}

function analyze(closes){

let price=closes[0]

let avg20=closes.slice(0,20).reduce((a,b)=>a+b)/20
let avg50=closes.slice(0,50).reduce((a,b)=>a+b)/50

let momentum5=(price-closes[5])/closes[5]
let momentum10=(price-closes[10])/closes[10]

let momentum=(momentum5+momentum10)/2

let bias="Neutral"

if(price>avg20 && avg20>avg50) bias="Bullish"
if(price<avg20 && avg20<avg50) bias="Bearish"

let direction="WAIT"

if(momentum>.02 && bias=="Bullish") direction="BUY CALL"
if(momentum<-.02 && bias=="Bearish") direction="BUY PUT"

let confidence="Low"

if(Math.abs(momentum)>.03) confidence="Medium"
if(Math.abs(momentum)>.05) confidence="High"

let expectedMove=price*0.04

let callStrike=(price*1.01)
let putStrike=(price*0.99)

let strike=direction=="BUY PUT"?putStrike:callStrike

let premium=strike*0.015

let breakeven=strike+premium

let breakevenDistance=Math.abs(breakeven-price)

let edge="Neutral"

if(expectedMove>breakevenDistance*1.2) edge="Favorable"
if(expectedMove<breakevenDistance) edge="Risky"

let thetaWarning="Low"

if(edge=="Risky") thetaWarning="High"

let momentumEngine="Neutral"

if(momentum>.04) momentumEngine="STRONG BULLISH"
else if(momentum>.02) momentumEngine="BULLISH"
else if(momentum<-.04) momentumEngine="STRONG BEARISH"
else if(momentum<-.02) momentumEngine="BEARISH"

let gamma="BALANCED"

if(momentum>.03) gamma="CALL DOMINANT"
if(momentum<-.03) gamma="PUT DOMINANT"

let smartMoney="NEUTRAL"

if(price>avg20 && momentum>.02) smartMoney="ACCUMULATING"
if(price<avg20 && momentum<-.02) smartMoney="DISTRIBUTION"

let score=50

if(bias=="Bullish"||bias=="Bearish") score+=10
if(confidence=="High") score+=20
if(edge=="Favorable") score+=15
if(momentumEngine.includes("STRONG")) score+=10

if(score>100) score=100

let grade="C"

if(score>90) grade="A+"
else if(score>80) grade="A"
else if(score>70) grade="B"

let stopLoss="-40%"
let takeProfit="+80%"

if(confidence=="High"){
stopLoss="-35%"
takeProfit="+120%"
}

return{

price:price.toFixed(2),
bias,
direction,
confidence,
expectedMove:expectedMove.toFixed(2),
strike:strike.toFixed(2),
premium:premium.toFixed(2),
breakeven:breakeven.toFixed(2),
breakevenDistance:breakevenDistance.toFixed(2),
edge,
thetaWarning,
momentumEngine,
gamma,
smartMoney,
score,
grade,
stopLoss,
takeProfit

}

}

async function runAI(){

let ticker=document.getElementById("ticker").value.toUpperCase()

let output=document.getElementById("output")

output.innerHTML="Analyzing..."

let closes=await getData(ticker)

if(!closes){
output.innerHTML="Data unavailable or API limit reached"
return
}

let a=analyze(closes)

output.innerHTML=

`<div class="card">

<b>AI TRADE SETUP</b><br><br>

Ticker: ${ticker}<br>
Price: $${a.price}<br>
Market Bias: ${a.bias}<br><br>

Momentum Engine: ${a.momentumEngine}<br>
Gamma Pressure: ${a.gamma}<br>
Smart Money Flow: ${a.smartMoney}<br><br>

Direction: ${a.direction}<br>
Confidence: ${a.confidence}<br>
Trade Score: ${a.score}/100 (${a.grade})<br><br>

Strike: ${a.strike}<br>
Premium Est: $${a.premium}<br>

Breakeven: $${a.breakeven}<br>
Distance to BE: $${a.breakevenDistance}<br><br>

Expected Move: $${a.expectedMove}<br>
Edge: ${a.edge}<br>
Theta Risk: ${a.thetaWarning}<br><br>

Stop Loss: ${a.stopLoss}<br>
Take Profit: ${a.takeProfit}

</div>`

}

async function scanMarket(){

let output=document.getElementById("output")

output.innerHTML="Scanning Market..."

let results=[]

for(let i=0;i<watchlist.length;i++){

let closes=await getData(watchlist[i])

if(!closes) continue

let a=analyze(closes)

if(a.direction!="WAIT"){

results.push({
ticker:watchlist[i],
score:a.score
})

}

await new Promise(r=>setTimeout(r,15000))

}

results.sort((a,b)=>b.score-a.score)

results=results.slice(0,2)

if(results.length==0){

output.innerHTML="No strong setups found"

return
}

let text="<div class='card'><b>Top Opportunities</b><br><br>"

results.forEach(r=>{
text+=`${r.ticker} — Score ${r.score}<br>`
})

text+="</div>"

output.innerHTML=text

}

</script>

</body>
</html>
