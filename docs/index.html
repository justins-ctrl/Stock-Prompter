<!DOCTYPE html>
<html>
<head>
  <title>AI Options Terminal Short</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:Arial,sans-serif;background:#071326;color:#fff;margin:0;padding:18px}
    .wrap{max-width:520px;margin:auto}
    .card{background:#13233d;padding:16px;border-radius:12px;margin-top:14px;border:1px solid rgba(58,139,253,.2)}
    .title{text-align:center;font-size:26px;font-weight:bold;margin-bottom:6px}
    .sub{text-align:center;opacity:.8;margin-bottom:14px;font-size:14px}
    input,select,button{width:100%;box-sizing:border-box;padding:14px;border-radius:10px;border:none;font-size:17px;margin-top:10px}
    input,select{background:#0e1c33;color:#fff}
    button{background:#3a8bfd;color:#fff}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .metric{margin:4px 0}
    .green{color:#3cff88}.red{color:#ff6b6b}.yellow{color:#ffd84d}.blue{color:#8ecbff}
    .warn{background:rgba(140,110,20,.18)} .good{background:rgba(35,85,35,.18)} .bad{background:rgba(165,48,48,.2)}
    @media(max-width:520px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="title">AI Options Terminal</div>
  <div class="sub">Short iPhone version</div>

  <div class="card">
    <div><b>Analyze Ticker</b></div>
    <input id="ticker" placeholder="Enter ticker">
    <button onclick="runAI()">Run AI Analysis</button>
  </div>

  <div class="card">
    <div><b>Save Position</b></div>
    <div class="row">
      <input id="posTicker" placeholder="Ticker">
      <select id="posType"><option value="CALL">Call</option><option value="PUT">Put</option></select>
      <input id="posStrike" placeholder="Strike">
      <input id="posBreakeven" placeholder="Breakeven">
      <input id="posEntryPremium" placeholder="Entry Premium (optional)">
      <input id="posExpiration" type="date">
    </div>
    <button onclick="addPosition()">Save Position</button>
    <div id="positionsList"></div>
    <button onclick="scanPositions()">Scan My Positions</button>
  </div>

  <div id="output"></div>
</div>

<script>
const API_KEY = "OHCJWFQEFSXI8IJ3";
let positions = JSON.parse(localStorage.getItem('short_positions') || '[]');

function savePositions(){ localStorage.setItem('short_positions', JSON.stringify(positions)); }
function normTicker(v){ return String(v||'').toUpperCase().trim().replace(/[^A-Z.]/g,''); }
function dte(exp){ if(!exp) return null; const t=new Date(); t.setHours(0,0,0,0); const e=new Date(exp+'T00:00:00'); return Math.ceil((e-t)/86400000); }
function color(v){
  if(["Bullish","BUY CALL","PASS","STRONG HOLD","Low","A","A+"].includes(v) || String(v).includes('BULLISH')) return 'green';
  if(["Bearish","BUY PUT","EXIT NOW","TAKE PROFIT","High","C"].includes(v) || String(v).includes('BEARISH')) return 'red';
  return 'yellow';
}
function renderPositions(){
  const el=document.getElementById('positionsList');
  if(!positions.length){ el.innerHTML="<div class='metric' style='margin-top:10px;opacity:.8'>No saved positions yet.</div>"; return; }
  el.innerHTML = positions.map((p,i)=>`<div class='metric' style='margin-top:10px'>${p.ticker} ${p.strike} ${p.type} 芒聙垄 BE ${p.breakeven}${p.expiration?` 芒聙垄 Exp ${p.expiration}`:''} <span onclick='removePosition(${i})' style='color:#ff6b6b'>Remove</span></div>`).join('');
}
function removePosition(i){ positions.splice(i,1); savePositions(); renderPositions(); }
function addPosition(){
  const p={
    ticker:normTicker(document.getElementById('posTicker').value),
    type:document.getElementById('posType').value,
    strike:parseFloat(document.getElementById('posStrike').value),
    breakeven:parseFloat(document.getElementById('posBreakeven').value),
    entryPremium:parseFloat(document.getElementById('posEntryPremium').value||'0'),
    expiration:document.getElementById('posExpiration').value
  };
  if(!p.ticker || Number.isNaN(p.strike) || Number.isNaN(p.breakeven)){ alert('Enter ticker, strike, and breakeven.'); return; }
  positions.push(p); savePositions(); renderPositions();
  ['posTicker','posStrike','posBreakeven','posEntryPremium','posExpiration'].forEach(id=>document.getElementById(id).value='');
}
async function j(url){ const r=await fetch(url); return await r.json(); }
async function getHistory(symbol){
  try{
    const d=await j(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${encodeURIComponent(symbol)}&apikey=${API_KEY}`);
    const s=d['Time Series (Daily)']; if(!s) return null;
    return Object.values(s).slice(0,60).map(v=>parseFloat(v['4. close'])).filter(v=>!Number.isNaN(v));
  }catch(e){ return null; }
}
async function getPrice(symbol, closes){
  try{
    const q=await j(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${encodeURIComponent(symbol)}&apikey=${API_KEY}`);
    const p=parseFloat(q?.['Global Quote']?.['05. price']);
    if(!Number.isNaN(p)&&p>0) return {price:p, source:'Global Quote'};
  }catch(e){}
  try{
    const d=await j(`https://www.alphavantage.co/query?function=TIME_SERIES_INTRADAY&symbol=${encodeURIComponent(symbol)}&interval=5min&outputsize=compact&apikey=${API_KEY}`);
    const s=d['Time Series (5min)'];
    if(s){ const k=Object.keys(s)[0]; const p=parseFloat(s[k]['4. close']); if(!Number.isNaN(p)&&p>0) return {price:p, source:'Intraday'}; }
  }catch(e){}
  if(closes&&closes.length) return {price:closes[0], source:'Daily Close'};
  return {price:null, source:'Unavailable'};
}
function avg(a){ return a.reduce((x,y)=>x+y,0)/a.length; }
function analyze(closes, live){
  const price=live ?? closes[0];
  const avg20=avg(closes.slice(0,20)), avg50=avg(closes.slice(0,50));
  const momentum=(closes[0]-closes[5])/closes[5];
  let bias='Neutral'; if(price>avg20&&avg20>avg50) bias='Bullish'; if(price<avg20&&avg20<avg50) bias='Bearish';
  let direction='WAIT'; if(momentum>.02&&bias==='Bullish') direction='BUY CALL'; if(momentum<-.02&&bias==='Bearish') direction='BUY PUT';
  let confidence='Low'; if(Math.abs(momentum)>.03) confidence='Medium'; if(Math.abs(momentum)>.05) confidence='High';
  const expectedMove=price*0.04;
  let score=50 + (bias!=='Neutral'?10:0) + (confidence==='High'?20:0) + (Math.abs(momentum)>.03?10:0);
  score=Math.min(100,score);
  let grade='C'; if(score>90) grade='A+'; else if(score>80) grade='A'; else if(score>70) grade='B';
  const tradeFilter=(grade==='C'||direction==='WAIT')?'FAIL':'PASS';
  let expiration='5-10 Days'; if(confidence==='High') expiration='3-5 Days (Weekly)';
  return {price:price.toFixed(2),bias,direction,confidence,score,grade,tradeFilter,expectedMove:expectedMove.toFixed(2),momentum};
}
function analyzePosition(pos, price, ai, source){
  const days=dte(pos.expiration);
  let timeRisk='Unknown', fit='Unknown';
  if(days!==null){ if(days<=1){timeRisk='Extreme'; fit='Very Short';} else if(days<=3){timeRisk='High'; fit='Tight';} else if(days<=7){timeRisk='Moderate'; fit='Good';} else {timeRisk='Low'; fit='Good';} }
  let status='WEAK HOLD', reason='Setup still active but needs close monitoring', cls='warn';
  const move=parseFloat(ai.expectedMove), nearBE=Math.abs(price-pos.breakeven)<=move*0.35;
  if(pos.type==='CALL'){
    if((days!==null&&days<=1&&price<pos.breakeven) || ai.tradeFilter==='FAIL') {status='EXIT NOW'; reason='Not enough time left for the call to work'; cls='bad';}
    else if(price>=pos.breakeven+move*0.35){status='TAKE PROFIT'; reason='Price moved through the call profit zone'; cls='bad';}
    else if(price>=pos.breakeven && ai.direction==='BUY CALL' && (days===null||days>2)){status='STRONG HOLD'; reason='Above breakeven with time left and bullish setup'; cls='good';}
    else if(nearBE){status='WEAK HOLD'; reason='Near breakeven, but needs more follow-through'; cls='warn';}
  } else {
    if((days!==null&&days<=1&&price>pos.breakeven) || ai.tradeFilter==='FAIL') {status='EXIT NOW'; reason='Not enough time left for the put to work'; cls='bad';}
    else if(price<=pos.breakeven-move*0.35){status='TAKE PROFIT'; reason='Price moved through the put profit zone'; cls='bad';}
    else if(price<=pos.breakeven && ai.direction==='BUY PUT' && (days===null||days>2)){status='STRONG HOLD'; reason='Below breakeven with time left and bearish setup'; cls='good';}
    else if(nearBE){status='WEAK HOLD'; reason='Near breakeven, but needs more downside follow-through'; cls='warn';}
  }
  const intrinsic=pos.type==='CALL'?Math.max(0,price-pos.strike):Math.max(0,pos.strike-price);
  const approxVal=intrinsic+(price*0.01);
  const pnl=pos.entryPremium>0?Math.round(((approxVal-pos.entryPremium)/pos.entryPremium)*100):null;
  return {livePrice:price.toFixed(2), source, days:days===null?'N/A':days, timeRisk, fit, status, reason, pnl, cls};
}

async function runAI(){
  const ticker=normTicker(document.getElementById('ticker').value);
  const out=document.getElementById('output');
  const mode=document.getElementById('uiMode').value;
  if(!ticker){ out.innerHTML="<div class='card'>Enter a ticker first.</div>"; return; }
  out.innerHTML="<div class='card'>Analyzing...</div>";
  const closes=await getHistory(ticker); if(!closes){ out.innerHTML="<div class='card'>Data unavailable.</div>"; return; }
  const pp=await getPrice(ticker, closes); if(pp.price===null){ out.innerHTML="<div class='card'>Price unavailable.</div>"; return; }
  const a=analyze(closes, pp.price);
  out.innerHTML = mode==='compact'
    ? `<div class='card'><div><b>${ticker}</b> 芒聙聰 $${a.price}</div><div class='metric'><span class='${color(a.direction)}'>${a.direction}</span> 芒聙垄 <span class='${color(a.grade)}'>${a.grade}</span> 芒聙垄 Score ${a.score}</div><div class='metric'>Filter: <span class='${a.tradeFilter==='PASS'?'green':'red'}'>${a.tradeFilter}</span></div><div class='metric'>Expiration: ${a.expiration}</div></div>`
    : `<div class='card'><div class='section-title'>AI Trade Setup</div><div class='metric'><b>Ticker:</b> ${ticker}</div><div class='metric'><b>Price:</b> $${a.price}</div><div class='metric'><b>Bias:</b> <span class='${color(a.bias)}'>${a.bias}</span></div><div class='metric'><b>Direction:</b> <span class='${color(a.direction)}'>${a.direction}</span></div><div class='metric'><b>Confidence:</b> ${a.confidence}</div><div class='metric'><b>Trade Score:</b> ${a.score}/100 (${a.grade})</div><div class='metric'><b>Trade Filter:</b> <span class='${a.tradeFilter==='PASS'?'green':'red'}'>${a.tradeFilter}</span></div><div class='metric'><b>Expected Move:</b> $${a.expectedMove}</div><div class='metric'><b>Suggested Expiration:</b> ${a.expiration}</div></div>`;
}

async function scanMarket(){

  out.innerHTML="<div class='card'>Scanning...</div>";

    const closes=await getHistory(t); if(!closes) continue;
    const pp=await getPrice(t, closes); if(pp.price===null) continue;
    const a=analyze(closes, pp.price); rows.push({t, a});
  }
  if(!rows.length){ out.innerHTML="<div class='card'>No setups found.</div>"; return; }
  out.innerHTML=`<div class='card'><div class='section-title'>Top Default Opportunities</div>${rows.map(r=>`<div class='metric'>${r.t} 芒聙聰 <span class='${color(r.a.direction)}'>${r.a.direction}</span> 芒聙聰 Score ${r.a.score}</div>`).join('')}</div>`;
}

async function scanMyWatchlist(){
  const out=document.getElementById('output');
  if(!customWatchlist.length){ out.innerHTML="<div class='card'>Your watchlist is empty.</div>"; return; }
  out.innerHTML="<div class='card'>Scanning...</div>";
  let rows=[];
  for(const t of customWatchlist.slice(0,2)){
    const closes=await getHistory(t); if(!closes) continue;
    const pp=await getPrice(t, closes); if(pp.price===null) continue;
    const a=analyze(closes, pp.price); rows.push({t, a});
  }
  if(!rows.length){ out.innerHTML="<div class='card'>No setups found.</div>"; return; }
  out.innerHTML=`<div class='card'><div class='section-title'>Top Watchlist Opportunities</div>${rows.map(r=>`<div class='metric'>${r.t} 芒聙聰 <span class='${color(r.a.direction)}'>${r.a.direction}</span> 芒聙聰 Score ${r.a.score}</div>`).join('')}</div>`;
}

async function scanPositions(){
  const out=document.getElementById('output');
  if(!positions.length){ out.innerHTML="<div class='card'>No saved positions yet.</div>"; return; }
  out.innerHTML="<div class='card'>Checking positions...</div>";
  let html='';
  for(const p of positions){
    const closes=await getHistory(p.ticker);
    if(!closes){ html += `<div class='card bad'><b>${p.ticker}</b> ${p.strike} ${p.type}<div class='metric'>Status: <span class='red'>UNAVAILABLE</span></div><div class='metric'>Reason: Could not load historical data</div></div>`; continue; }
    const pp=await getPrice(p.ticker, closes);
    if(pp.price===null){ html += `<div class='card bad'><b>${p.ticker}</b> ${p.strike} ${p.type}<div class='metric'>Status: <span class='red'>UNAVAILABLE</span></div><div class='metric'>Reason: Could not load price</div></div>`; continue; }
    const ai=analyze(closes, pp.price);
    const m=analyzePosition(p, pp.price, ai, pp.source);
    html += `<div class='card ${m.cls}'><div><b>${p.ticker}</b> ${p.strike} ${p.type}</div><div class='metric'><b>Live Price:</b> $${m.livePrice}</div><div class='metric'><b>Breakeven:</b> $${p.breakeven}</div><div class='metric'><b>Expiration:</b> ${p.expiration || 'Not set'}</div><div class='metric'><b>DTE:</b> ${m.days}</div><div class='metric'><b>Time Risk:</b> <span class='${color(m.timeRisk)}'>${m.timeRisk}</span></div><div class='metric'><b>Expiration Fit:</b> <span class='${color(m.fit)}'>${m.fit}</span></div><div class='metric'><b>Status:</b> <span class='${color(m.status)}'>${m.status}</span></div><div class='metric'><b>Reason:</b> ${m.reason}</div><div class='metric'><b>Price Source:</b> ${m.source}</div>${m.pnl!==null?`<div class='metric'><b>Approx P/L:</b> ${m.pnl>0?'+':''}${m.pnl}%</div>`:''}</div>`;
  }
  out.innerHTML = html;
}

renderWatchlist();
renderPositions();
</script>
</body>
</html>
