<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Prompter Pro</title>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 95%;
  max-width: 900px;
  padding: 40px;
}

h1 {
  text-align: center;
  color: #00ffcc;
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 6px;
  border: none;
  box-sizing: border-box;
}

button {
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

#result {
  margin-top: 30px;
  padding: 25px;
  background: #1a1a1a;
  border-radius: 10px;
}

.warning { color: orange; font-weight: bold; }
.danger { color: red; font-weight: bold; }
.bullish { color: lime; font-weight: bold; }
.bearish { color: red; font-weight: bold; }
</style>
</head>
<body>

<div class="container">

<h1>Trade Prompter Pro</h1>

<label>Ticker Symbol:</label>
<input id="ticker" placeholder="AAPL" />

<label>Account Size ($):</label>
<input id="accountSize" type="number" placeholder="1000" />

<label>Expiration:</label>
<select id="expiry">
  <option value="weekly">Weekly</option>
  <option value="biweekly">Bi-Weekly</option>
</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

</div>

<script>

async function getPrice(ticker) {
  try {
    const response = await fetch(
      `https://financialmodelingprep.com/api/v3/quote/${ticker}?apikey=demo`
    );
    const data = await response.json();
    if (data && data.length > 0) {
      return data[0].price;
    }
  } catch (e) {}
  return null;
}

function simulatePrice() {
  return 100 + Math.random() * 50;
}

async function analyze() {

  const ticker = document.getElementById("ticker").value.toUpperCase();
  const account = parseFloat(document.getElementById("accountSize").value);
  const expiry = document.getElementById("expiry").value;
  const result = document.getElementById("result");

  if (!ticker || !account) {
    result.innerHTML = "Enter ticker and account size.";
    return;
  }

  result.innerHTML = "Fetching price...";

  let price = await getPrice(ticker);

  if (!price) {
    price = simulatePrice();
    result.innerHTML = "<p class='warning'>Live data unavailable. Using simulator.</p>";
  }

  const movePercent = expiry === "weekly" ? 0.04 : 0.07;
  const expectedMove = price * movePercent;
  const upperRange = price + expectedMove;
  const lowerRange = price - expectedMove;

  const suggestedStrike = price + 2;
  const optionCost = price * 0.05;
  const breakeven = suggestedStrike + optionCost;
  const percentMoveNeeded = ((breakeven - price) / price) * 100;

  result.innerHTML += `
      <h2>${ticker}</h2>
      <p>Price: $${price.toFixed(2)}</p>
      <hr>
      <p>Expected Move: ±$${expectedMove.toFixed(2)}</p>
      <p>Projected Range: $${lowerRange.toFixed(2)} - $${upperRange.toFixed(2)}</p>
      <hr>
      <p>Suggested Strike (ATM +1/2 OTM): $${suggestedStrike.toFixed(2)}</p>
      <p>Estimated Option Cost: $${optionCost.toFixed(2)}</p>
      <p>Breakeven: $${breakeven.toFixed(2)}</p>
      <p>% Move Required: ${percentMoveNeeded.toFixed(2)}%</p>
  `;
}

</script>

</body>
</html>
