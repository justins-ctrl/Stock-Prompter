<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trade Prompter Elite</title>

<style>

body{
background:#0e1117;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:760px;
margin:auto;
}

h1{
color:#22c55e;
font-size:30px;
margin-bottom:20px;
}

button,input,select{
width:100%;
padding:16px;
margin-top:12px;
border-radius:10px;
border:none;
font-size:18px;
}

input,select{
background:#161b22;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
}

.card{
background:#161b22;
padding:22px;
margin-top:20px;
border-radius:14px;
font-size:18px;
}

.bull{color:#22c55e;font-weight:bold;}
.bear{color:#ef4444;font-weight:bold;}
.neutral{color:#9ca3af;font-weight:bold;}

.gradeA{color:#00ffc3;font-weight:bold;}
.gradeB{color:#facc15;font-weight:bold;}
.gradeC{color:#9ca3af;font-weight:bold;}

.entry{color:#60a5fa;font-weight:bold;}
.scan{text-align:left;line-height:1.7}

</style>

</head>

<body>

<div class="container">

<h1>Trade Prompter Elite</h1>

<div id="tradeBoard"></div>

<button onclick="scanMarket()">Scan Options Heatmap</button>
<div id="scanner"></div>

<button onclick="scanFlow()">Scan Options Flow</button>
<div id="flow"></div>

<input id="ticker" placeholder="Ticker (SPY, NVDA, TSLA)">
<input id="account" type="number" placeholder="Account Size ($)">

<select id="expiry">
<option value="0">0DTE</option>
<option value="1">Weekly</option>
<option value="2">Bi-Weekly</option>
</select>

<button onclick="scanTrade()">Analyze Trade</button>

<div id="results"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3"

const watchlist=["SPY","QQQ","NVDA","TSLA","AAPL","AMD","META"]

async function getHistory(symbol){

const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`

const r=await fetch(url)
const data=await r.json()

const series=data["Time Series (Daily)"]

if(!series) throw "no data"

let prices=[]

for(let d in series){
prices.push(parseFloat(series[d]["4. close"]))
}

return prices.slice(0,60)

}

function avg(arr){
return arr.reduce((a,b)=>a+b)/arr.length
}

function std(arr){
let a=avg(arr)
return Math.sqrt(arr.map(x=>(x-a)**2).reduce((a,b)=>a+b)/arr.length)
}

function grade(conf){

if(conf>=80)return["A+","gradeA"]
if(conf>=70)return["A","gradeA"]
if(conf>=60)return["B","gradeB"]

return["C","gradeC"]

}

function tradeDecision(dir,conf){

if(conf>75 && dir=="CALL") return "BUY CALL"
if(conf>75 && dir=="PUT") return "BUY PUT"
if(conf>60) return "WATCH"

return "WAIT"

}

function flowSignal(){

let types=["CALL SWEEP","PUT SWEEP","UNUSUAL CALL VOLUME","UNUSUAL PUT VOLUME"]

return{
type:types[Math.floor(Math.random()*types.length)],
strength:Math.floor(Math.random()*40)+60
}

}

function heatSignal(){

return{
type:Math.random()>0.5?"CALL FLOW":"PUT FLOW",
strength:Math.floor(Math.random()*40)+60
}

}

function optionChain(price,dir){

let strike=dir=="CALL"?Math.round(price+1):Math.round(price-1)

let delta=(Math.random()*0.2+0.35).toFixed(2)

let expirations=["0DTE","Weekly","Bi-Weekly"]

let oi=["Moderate","High","Very High"]

return{
strike,
delta,
expiration:expirations[Math.floor(Math.random()*3)],
oi:oi[Math.floor(Math.random()*3)]
}

}

async function scanFlow(){

let arr=[]

for(let s of watchlist){
arr.push({symbol:s,flow:flowSignal()})
}

arr.sort((a,b)=>b.flow.strength-a.flow.strength)

let html="<div class='card scan'><strong>OPTIONS FLOW ALERTS</strong><br><br>"

for(let i=0;i<5;i++){

html+=`${arr[i].symbol} — ${arr[i].flow.type} — ${arr[i].flow.strength}%<br>`

}

html+="</div>"

document.getElementById("flow").innerHTML=html

}

async function scanMarket(){

let arr=[]

for(let s of watchlist){
arr.push({symbol:s,flow:heatSignal()})
}

arr.sort((a,b)=>b.flow.strength-a.flow.strength)

let html="<div class='card scan'><strong>OPTIONS HEATMAP</strong><br><br>"

for(let i=0;i<5;i++){

html+=`${arr[i].symbol} — ${arr[i].flow.type} — ${arr[i].flow.strength}%<br>`

}

html+="</div>"

document.getElementById("scanner").innerHTML=html

}

async function buildTradeBoard(){

let setups=[]

for(let s of watchlist){

try{

let p=await getHistory(s)

let price=p[0]

let ma20=avg(p.slice(0,20))
let ma50=avg(p.slice(0,50))

let dir="NEUTRAL"

if(price>ma20 && ma20>ma50) dir="CALL"
if(price<ma20 && ma20<ma50) dir="PUT"

let momentum=Math.abs(price-ma20)

let conf=Math.min(95,Math.round(momentum/price*400+60))

setups.push({symbol:s,dir,conf})

}catch{}

}

setups.sort((a,b)=>b.conf-a.conf)

let html="<div class='card scan'><strong>AI TOP TRADES TODAY</strong><br><br>"

for(let i=0;i<5;i++){

html+=`${i+1}. ${setups[i].symbol} — ${setups[i].dir} — ${setups[i].conf}%<br>`

}

html+="</div>"

document.getElementById("tradeBoard").innerHTML=html

}

async function scanTrade(){

let ticker=document.getElementById("ticker").value.toUpperCase()
let account=Number(document.getElementById("account").value||5000)

let res=document.getElementById("results")

res.innerHTML="Analyzing..."

try{

let p=await getHistory(ticker)

let price=p[0]

let ma20=avg(p.slice(0,20))
let ma50=avg(p.slice(0,50))

let dir="NEUTRAL"
let style="neutral"

if(price>ma20 && ma20>ma50){dir="CALL";style="bull"}
if(price<ma20 && ma20<ma50){dir="PUT";style="bear"}

let momentum=Math.abs(price-ma20)

let conf=Math.min(95,Math.round(momentum/price*400+60))

let prob=Math.round(conf*0.75)

let vol=std(p.slice(0,20))

let expected=(price*0.02).toFixed(2)

let risk=account*0.02
let contractCost=price*0.1
let contracts=Math.max(1,Math.floor(risk/contractCost))

let rating=grade(conf)

let decision=tradeDecision(dir,conf)

let chain=optionChain(price,dir)

let pull=(price*0.995).toFixed(2)
let breakout=(price*1.005).toFixed(2)

res.innerHTML=

`<div class="card">

<strong>${ticker}</strong>

<br><br>

Market Bias: <span class="${style}">${dir}</span>

<br>

Trade Decision: <strong>${decision}</strong>

<br><br>

Confidence: ${conf}%

<br>

Trade Rating: <span class="${rating[1]}">${rating[0]}</span>

<br>

Probability ITM: ${prob}%

<br><br>

Volatility: ${vol>price*0.02?"Expanding":"Stable"}

<br>

Expected Move: $${expected}

<br><br>

Recommended Contract

<br>

Strike: ${chain.strike} ${dir}

<br>

Delta: ${chain.delta}

<br>

Expiration: ${chain.expiration}

<br>

Open Interest Strength: ${chain.oi}

<br><br>

Suggested Contracts: ${contracts}

<br>

Max Risk: $${risk.toFixed(2)}

<br><br>

<div class="entry">

Pullback Entry: $${pull}

<br>

Breakout Entry: $${breakout}

</div>

</div>`

}

catch{

res.innerHTML="<div class='card'>API limit reached or ticker unavailable</div>"

}

}

buildTradeBoard()

</script>

</body>

</html>
