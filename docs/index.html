<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Trade Prompter Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Trade Prompter Pro</h1>

<input id="tickerInput" placeholder="Enter Ticker (ex: AAPL)" />
<button onclick="analyzeStock()">Analyze</button>

<div id="result"></div>

<script>

const WORKER_URL = "https://patient-boat-e680.mftgngkpk4.workers.dev/";

async function analyzeStock() {

  const ticker = document.getElementById("tickerInput").value.trim().toUpperCase();
  const resultDiv = document.getElementById("result");

  if (!ticker) {
    resultDiv.innerHTML = "Enter a ticker.";
    return;
  }

  resultDiv.innerHTML = "Fetching live data...";

  try {

    // 1️⃣ Fetch LIVE stock data directly from Yahoo (browser side)
    const stockResponse = await fetch(
      `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${ticker}`
    );

    const stockData = await stockResponse.json();

    if (!stockData.quoteResponse ||
        !stockData.quoteResponse.result ||
        stockData.quoteResponse.result.length === 0) {

      resultDiv.innerHTML = "Invalid ticker.";
      return;
    }

    const stock = stockData.quoteResponse.result[0];

    const price = stock.regularMarketPrice;
    const change = stock.regularMarketChangePercent;

    // 2️⃣ Send to your Worker for bias logic
    const workerResponse = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        symbol: ticker,
        price: price,
        change: change
      })
    });

    const workerData = await workerResponse.json();

    let biasColor = "gray";
    if (workerData.bias === "Bullish") biasColor = "green";
    if (workerData.bias === "Bearish") biasColor = "red";

    resultDiv.innerHTML = `
      <h2>${ticker}</h2>
      <p><b>Price:</b> $${price.toFixed(2)}</p>
      <p><b>Change:</b> ${change.toFixed(2)}%</p>
      <p style="color:${biasColor}; font-weight:bold;">
        Bias: ${workerData.bias}
      </p>
      <hr>
      <p><b>Options Direction:</b></p>
      <p>
        ${workerData.bias === "Bullish" ?
          "Consider Weekly Call slightly OTM" :
          workerData.bias === "Bearish" ?
          "Consider Weekly Put slightly OTM" :
          "Wait for stronger move before entry"}
      </p>
    `;

  } catch (error) {
    resultDiv.innerHTML = "Connection issue.";
  }
}

</script>

</body>
</html>
