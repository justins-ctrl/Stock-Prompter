<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

input,select,button{

width:100%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:16px;

}

button{
background:#00c896;
color:white;
font-weight:bold;
}

#result{

margin-top:20px;
padding:20px;
background:#1a1a1a;
border-radius:10px;

}

.bullish{
color:lime;
font-weight:bold;
}

.bearish{
color:red;
font-weight:bold;
}

.warning{
color:orange;
font-weight:bold;
}

.strong{
color:#00ffcc;
font-weight:bold;
font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Trade Prompter Elite</h1>

<input id="ticker" placeholder="Ticker (AAPL)">

<input id="accountSize" type="number" placeholder="Account Size">

<select id="expiry">

<option value="weekly">Weekly</option>
<option value="biweekly">Bi-Weekly</option>

</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

</div>

<script>

const API_KEY="PASTE_YOUR_ALPHA_KEY_HERE";

async function getDaily(ticker){

const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&apikey=${API_KEY}`;

const res=await fetch(url);

const data=await res.json();

return data["Time Series (Daily)"];

}

function calculateRSI(closes,period=14){

let gains=0;
let losses=0;

for(let i=1;i<=period;i++){

const diff=closes[i-1]-closes[i];

if(diff>0) gains+=diff;
else losses-=diff;

}

const avgGain=gains/period;
const avgLoss=losses/period;

const rs=avgGain/avgLoss;

return 100-(100/(1+rs));

}

async function analyze(){

const ticker=document.getElementById("ticker").value.toUpperCase();
const account=document.getElementById("accountSize").value;
const expiry=document.getElementById("expiry").value;

const result=document.getElementById("result");

result.innerHTML="Analyzing...";

const daily=await getDaily(ticker);

if(!daily){

result.innerHTML="<span class='warning'>Invalid symbol or API limit.</span>";

return;

}

const dates=Object.keys(daily);

const closes=dates.slice(0,30).map(d=>parseFloat(daily[d]["4. close"]));

const price=closes[0];

const rsi=calculateRSI(closes);

let direction="";
let confidence=50;
let strike="";
let entrySignal="Wait";

if(rsi<35){

direction="CALL";
confidence=72;
strike=(price*1.01).toFixed(2);
entrySignal="Strong Setup";

}

else if(rsi>65){

direction="PUT";
confidence=72;
strike=(price*0.99).toFixed(2);
entrySignal="Strong Setup";

}

else{

direction="WAIT";
confidence=40;

}

if(direction==="WAIT"){

result.innerHTML=`

<div class="warning">

Market Neutral<br><br>

Price: $${price.toFixed(2)}<br>

RSI: ${rsi.toFixed(1)}<br><br>

Best Action: WAIT

</div>

`;

return;

}

result.innerHTML=`

<div class="strong">

Price: $${price.toFixed(2)}

</div>

<br>

<div class="${direction==="CALL"?"bullish":"bearish"}">

Direction: ${direction}

</div>

<br>

Suggested Strike: $${strike}<br><br>

Expiration: ${expiry}<br><br>

Confidence: ${confidence}%<br><br>

Entry Signal: ${entrySignal}

`;

}

</script>

</body>

</html>
