<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Trade Prompter Pro</title>
  <style>
    body { font-family: Arial; padding: 40px; background: #f4f4f4; }
    input { padding: 8px; font-size: 16px; }
    button { padding: 8px 12px; font-size: 16px; cursor: pointer; }
    #result { margin-top: 20px; }
  </style>
</head>
<body>

<h1>Trade Prompter Pro</h1>

<input id="tickerInput" placeholder="Enter Ticker (ex: AAPL)" />
<button onclick="analyzeStock()">Analyze</button>

<div id="result"></div>

<script>

async function analyzeStock() {

  const ticker = document.getElementById("tickerInput").value.trim().toUpperCase();
  const resultDiv = document.getElementById("result");

  if (!ticker) {
    resultDiv.innerHTML = "Enter a ticker.";
    return;
  }

  resultDiv.innerHTML = "Fetching live data...";

  try {

    // Financial Modeling Prep free demo endpoint
    const response = await fetch(
      `https://financialmodelingprep.com/api/v3/quote-short/${ticker}?apikey=demo`
    );

    const data = await response.json();

    if (!data || data.length === 0) {
      resultDiv.innerHTML = "Invalid ticker.";
      return;
    }

    const price = data[0].price;

    // Simple bias logic (price momentum placeholder)
    let bias = "Neutral";
    if (price % 2 === 0) bias = "Bullish";
    if (price % 2 !== 0) bias = "Bearish";

    let biasColor = bias === "Bullish" ? "green" : "red";

    resultDiv.innerHTML = `
      <h2>${ticker}</h2>
      <p><b>Price:</b> $${price.toFixed(2)}</p>
      <p style="color:${biasColor}; font-weight:bold;">
        Bias: ${bias}
      </p>
      <hr>
      <p><b>Options Direction:</b></p>
      <p>
        ${bias === "Bullish" ?
          "Consider Weekly Call slightly OTM" :
          "Consider Weekly Put slightly OTM"}
      </p>
    `;

  } catch (error) {
    resultDiv.innerHTML = "Connection issue.";
  }
}

</script>

</body>
</html>
