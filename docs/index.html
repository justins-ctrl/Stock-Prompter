<!DOCTYPE html>
<html>
<head>

<title>AI Options Terminal V12</title>

<style>

body{
font-family:Arial;
background:#0b0f19;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:16px;
border:none;
border-radius:6px;
background:#2f8cff;
color:white;
margin-top:8px;
}

button:hover{
background:#1c6fd1;
}

#output{
margin-top:20px;
padding:15px;
background:#121826;
border-radius:8px;
}

table{
width:100%;
margin-top:10px;
}

td{
padding:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Options Terminal V12</h2>

<input id="ticker" placeholder="Enter Ticker">

<button onclick="scan()">Run AI Scan</button>

<button onclick="marketScan()">Scan Market</button>

<div id="output"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3"

let output=document.getElementById("output")

const watchlist=[
"SPY","QQQ","NVDA","TSLA","AAPL",
"AMD","META","NFLX","COIN","MSFT",
"AMZN","GOOGL","SMCI","PLTR","INTC",
"CRM","ORCL","BA","DIS","SHOP",
"UBER","SNOW","ADBE","PYPL","SQ"
]

async function getData(symbol){

let url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`

let r=await fetch(url)
let d=await r.json()

let s=d["Time Series (Daily)"]

if(!s) return null

let closes=Object.values(s)
.slice(0,60)
.map(x=>parseFloat(x["4. close"]))

return closes

}

function rsi(prices){

let gains=0
let losses=0

for(let i=1;i<prices.length;i++){

let diff=prices[i]-prices[i-1]

if(diff>0) gains+=diff
else losses+=Math.abs(diff)

}

let rs=gains/losses

return 100-(100/(1+rs))

}

function sma(prices,period){

let sum=0

for(let i=0;i<period;i++) sum+=prices[i]

return sum/period

}

function macd(prices){

let short=sma(prices,12)
let long=sma(prices,26)

return short-long

}

function vwap(prices){

let sum=0

for(let p of prices) sum+=p

return sum/prices.length

}

function analyze(prices){

let latest=prices[0]

let r=rsi(prices)

let sma20=sma(prices,20)

let m=macd(prices)

let v=vwap(prices)

let bias="Neutral"

if(latest>sma20 && r>55 && m>0) bias="Bullish"

if(latest<sma20 && r<45 && m<0) bias="Bearish"

let signal="Wait"

if(bias=="Bullish") signal="Buy Calls"

if(bias=="Bearish") signal="Buy Puts"

let score=50

if(bias=="Bullish") score+=20
if(bias=="Bearish") score+=20

if(r>60 || r<40) score+=10
if(m>0) score+=10

let pop=Math.min(90,score)

let confidence="Medium"

if(score>80) confidence="High"
if(score<60) confidence="Low"

return{

price:latest.toFixed(2),

rsi:r.toFixed(1),

sma:sma20.toFixed(2),

macd:m.toFixed(2),

vwap:v.toFixed(2),

bias:bias,

signal:signal,

score:score,

pop:pop,

confidence:confidence

}

}

async function scan(){

let symbol=document.getElementById("ticker").value.toUpperCase()

output.innerHTML="Running AI analysis..."

let prices=await getData(symbol)

if(!prices){

output.innerHTML="API error or limit reached"

return

}

let a=analyze(prices)

output.innerHTML=`

<h3>${symbol}</h3>

<table>

<tr><td>Price</td><td>${a.price}</td></tr>

<tr><td>RSI</td><td>${a.rsi}</td></tr>

<tr><td>SMA20</td><td>${a.sma}</td></tr>

<tr><td>MACD</td><td>${a.macd}</td></tr>

<tr><td>VWAP</td><td>${a.vwap}</td></tr>

<tr><td>Bias</td><td>${a.bias}</td></tr>

<tr><td>Options Signal</td><td>${a.signal}</td></tr>

<tr><td>AI Trade Score</td><td>${a.score}/100</td></tr>

<tr><td>Probability of Profit</td><td>${a.pop}%</td></tr>

<tr><td>Confidence</td><td>${a.confidence}</td></tr>

</table>

`

}

async function marketScan(){

output.innerHTML="AI scanning market..."

let results=[]

for(let s of watchlist){

let prices=await getData(s)

if(!prices) continue

let a=analyze(prices)

results.push({symbol:s,...a})

}

results.sort((a,b)=>b.score-a.score)

let html=`<h3>Top AI Setups</h3><table>`

for(let r of results.slice(0,10)){

html+=`

<tr>

<td>${r.symbol}</td>
<td>${r.signal}</td>
<td>${r.score}</td>
<td>${r.bias}</td>

</tr>

`

}

html+=`</table>`

output.innerHTML=html

}

</script>

</body>
</html>
