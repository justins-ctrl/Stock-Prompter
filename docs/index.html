<!DOCTYPE html>
<html>
<head>
<title>AI Options Trading Terminal V8</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0c0f14;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

h1{
text-align:center;
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:14px;
font-size:18px;
margin-top:10px;
background:#1e90ff;
border:none;
color:white;
border-radius:8px;
}

.card{
background:#161b22;
padding:16px;
margin-top:14px;
border-radius:10px;
}

.good{color:#00e676}
.bad{color:#ff5252}
.neutral{color:#ffd54f}

</style>
</head>

<body>

<div class="container">

<h1>AI Options Terminal</h1>

<input id="ticker" placeholder="Enter Ticker (AAPL, NVDA, TSLA)">

<button onclick="scan()">Run AI Scan</button>

<div id="output"></div>

</div>

<script>

const API_KEY = "OHCJWFQEFSXI8IJ3";

async function scan(){

let ticker = document.getElementById("ticker").value.toUpperCase()

let url =
`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&apikey=${API_KEY}`

let res = await fetch(url)
let data = await res.json()

let series = data["Time Series (Daily)"]

if(!series){
document.getElementById("output").innerHTML =
"<div class='card'>API limit or ticker error</div>"
return
}

let closes = Object.values(series).slice(0,50).map(d=>parseFloat(d["4. close"]))

let price = closes[0]

let ma20 = avg(closes.slice(0,20))
let ma50 = avg(closes.slice(0,50))

let momentum = (price - closes[10]) / closes[10]

let bias = "Neutral"
if(price > ma20 && ma20 > ma50) bias = "Bullish"
if(price < ma20 && ma20 < ma50) bias = "Bearish"

let direction = bias=="Bullish"?"CALL":bias=="Bearish"?"PUT":"WAIT"

let confidence = Math.min(95,
Math.abs(momentum*100)+50)

let rating = "C"
if(confidence>80) rating="A"
else if(confidence>65) rating="B"

let probabilityITM = Math.min(80,
Math.abs(momentum*120)+40)

let pop = Math.min(85,
probabilityITM+5)

let expectedMove = (price * 0.04).toFixed(2)

let atm = Math.round(price)
let otm1 = bias=="Bullish"?atm+2:atm-2
let otm2 = bias=="Bullish"?atm+4:atm-4

let contracts = Math.max(1,
Math.floor(1000/(price*10)))

let pullback = (price*0.99).toFixed(2)
let breakout = (price*1.01).toFixed(2)

let profitTarget = "+50%"
let stopLoss = "-30%"

let momentumStrength =
Math.abs(momentum)>0.03?"Strong":
Math.abs(momentum)>0.015?"Moderate":"Weak"

let trendAlign =
price>ma20 && ma20>ma50?"Yes":"No"

let volatility =
Math.abs(momentum)>0.025?"Expanding":"Normal"

let gamma =
bias=="Bullish"?"Bullish":"Bearish"

let decayRisk =
"Medium"

document.getElementById("output").innerHTML =

`

<div class="card">

<b>${ticker}</b><br>
Price: $${price.toFixed(2)}

</div>

<div class="card">

<b>AI Trade Intelligence</b><br>

Market Bias:
<span class="${bias=="Bullish"?"good":bias=="Bearish"?"bad":"neutral"}">${bias}</span><br>

AI Direction: ${direction}<br>

Trade Decision:
<b>${direction=="CALL"?"BUY CALL":direction=="PUT"?"BUY PUT":"WAIT"}</b><br>

Confidence Score: ${confidence.toFixed(0)}%<br>

Trade Rating: ${rating}<br>

Probability ITM: ${probabilityITM.toFixed(0)}%<br>

Probability of Profit (POP): ${pop.toFixed(0)}%

</div>

<div class="card">

<b>Market Analysis</b><br>

Momentum Strength: ${momentumStrength}<br>

Trend Alignment: ${trendAlign}<br>

Volatility: ${volatility}<br>

Gamma Pressure: ${gamma}<br>

Premium Risk: Low

</div>

<div class="card">

<b>Options Strategy</b><br>

Expected Move: ±$${expectedMove}<br><br>

Best Strikes<br>

ATM: ${atm}<br>

1 OTM: ${otm1}<br>

2 OTM: ${otm2}<br><br>

Best Expiration: 7-14 Days<br>

Contracts Suggested: ${contracts}<br>

Decay Risk: ${decayRisk}

</div>

<div class="card">

<b>Entry Engine</b><br>

Pullback Entry: ${pullback}<br>

Breakout Entry: ${breakout}

</div>

<div class="card">

<b>AI Exit Plan</b><br>

Profit Target: ${profitTarget}<br>

Stop Loss: ${stopLoss}<br>

Exit Warning: Watch momentum weakening

</div>

`

}

function avg(arr){

return arr.reduce((a,b)=>a+b,0)/arr.length

}

</script>

</body>
</html>
