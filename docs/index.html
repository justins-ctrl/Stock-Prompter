<!DOCTYPE html>
<html>
<head>

<title>AI Options Terminal V13 - Hedge Fund Mode</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0b0f19;
color:white;
padding:16px;
}

.container{
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:8px;
background:#2f8cff;
color:white;
margin-top:8px;
}

button:hover{
background:#1c6fd1;
}

.card{
background:#121826;
padding:14px;
border-radius:10px;
margin-top:14px;
}

table{
width:100%;
margin-top:8px;
}

td{
padding:6px;
font-size:14px;
}

.best{
background:#1c2c48;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Options Terminal V13</h2>

<input id="ticker" placeholder="Enter Ticker">

<button onclick="scan()">Run AI Scan</button>

<button onclick="marketScan()">Scan Market</button>

<div id="output"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3"

let output=document.getElementById("output")

const watchlist=[
"SPY","QQQ","NVDA","TSLA","AAPL",
"AMD","META","NFLX","COIN","MSFT",
"AMZN","GOOGL","SMCI","PLTR","INTC",
"CRM","ORCL","BA","DIS","SHOP",
"UBER","SNOW","ADBE","PYPL","SQ"
]

async function getData(symbol){

let url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`

let r=await fetch(url)
let d=await r.json()

let s=d["Time Series (Daily)"]

if(!s) return null

let closes=Object.values(s)
.slice(0,60)
.map(x=>parseFloat(x["4. close"]))

return closes

}

function rsi(prices){

let gains=0
let losses=0

for(let i=1;i<prices.length;i++){

let diff=prices[i]-prices[i-1]

if(diff>0) gains+=diff
else losses+=Math.abs(diff)

}

let rs=gains/losses

return 100-(100/(1+rs))

}

function sma(prices,p){

let sum=0
for(let i=0;i<p;i++) sum+=prices[i]

return sum/p

}

function macd(prices){

return sma(prices,12)-sma(prices,26)

}

function vwap(prices){

let sum=0
for(let p of prices) sum+=p

return sum/prices.length

}

function analyze(prices,spy){

let latest=prices[0]

let r=rsi(prices)
let s=sma(prices,20)
let m=macd(prices)
let v=vwap(prices)

let bias="Neutral"

if(latest>s && r>55 && m>0) bias="Bullish"
if(latest<s && r<45 && m<0) bias="Bearish"

let signal="Wait"

if(bias=="Bullish") signal="Buy Calls"
if(bias=="Bearish") signal="Buy Puts"

let score=50

if(bias!="Neutral") score+=20
if(r>60||r<40) score+=10
if(m>0) score+=10
if(latest>v) score+=10

let relative=0

if(spy){
relative=((latest-prices[10])-(spy[0]-spy[10])).toFixed(2)
}

let breakout="No"

if(r>60 && latest>s && m>0) breakout="Breakout"

let pop=Math.min(90,score)

let confidence="Medium"

if(score>80) confidence="High"
if(score<60) confidence="Low"

return{
price:latest.toFixed(2),
rsi:r.toFixed(1),
sma:s.toFixed(2),
macd:m.toFixed(2),
vwap:v.toFixed(2),
bias:bias,
signal:signal,
score:score,
pop:pop,
confidence:confidence,
relative:relative,
breakout:breakout
}

}

async function scan(){

let symbol=document.getElementById("ticker").value.toUpperCase()

output.innerHTML="Running AI analysis..."

let prices=await getData(symbol)

if(!prices){
output.innerHTML="API error"
return
}

let spy=await getData("SPY")

let a=analyze(prices,spy)

output.innerHTML=`

<div class="card">

<h3>${symbol}</h3>

<table>

<tr><td>Price</td><td>${a.price}</td></tr>
<tr><td>RSI</td><td>${a.rsi}</td></tr>
<tr><td>SMA20</td><td>${a.sma}</td></tr>
<tr><td>MACD</td><td>${a.macd}</td></tr>
<tr><td>VWAP</td><td>${a.vwap}</td></tr>
<tr><td>Bias</td><td>${a.bias}</td></tr>
<tr><td>Options Signal</td><td>${a.signal}</td></tr>
<tr><td>Hedge Fund Score</td><td>${a.score}/100</td></tr>
<tr><td>Probability of Profit</td><td>${a.pop}%</td></tr>
<tr><td>Relative Strength vs SPY</td><td>${a.relative}</td></tr>
<tr><td>Momentum</td><td>${a.breakout}</td></tr>
<tr><td>Confidence</td><td>${a.confidence}</td></tr>

</table>

</div>

`

}

async function marketScan(){

output.innerHTML="Scanning market..."

let spy=await getData("SPY")

let results=[]

for(let s of watchlist){

let prices=await getData(s)

if(!prices) continue

let a=analyze(prices,spy)

results.push({symbol:s,...a})

await new Promise(r=>setTimeout(r,12000))

}

results.sort((a,b)=>b.score-a.score)

let best=results[0]

let html=`<div class="card best">

<b>AI Best Trade Today</b><br>

${best.symbol}<br>

Signal: ${best.signal}<br>

Score: ${best.score}

</div>

<div class="card">

<h3>Top Hedge Fund Setups</h3>

<table>`

for(let r of results.slice(0,10)){

html+=`

<tr>

<td>${r.symbol}</td>
<td>${r.signal}</td>
<td>${r.score}</td>
<td>${r.breakout}</td>

</tr>

`

}

html+=`</table></div>`

output.innerHTML=html

}

</script>

</body>
</html>
