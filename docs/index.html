<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Prompter Pro</title>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 95%;
  max-width: 900px;
  padding: 40px;
}

h1 {
  text-align: center;
  color: #00ffcc;
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 6px;
  border: none;
  box-sizing: border-box;
}

button {
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

#result {
  margin-top: 30px;
  padding: 25px;
  background: #1a1a1a;
  border-radius: 10px;
  font-size: 18px;
}

.bullish { color: lime; font-weight: bold; }
.bearish { color: red; font-weight: bold; }
.warning { color: orange; font-weight: bold; }
.strong { color: #00ffcc; font-weight: bold; }
</style>
</head>
<body>

<div class="container">

<h1>Trade Prompter Pro</h1>

<label>Ticker Symbol:</label>
<input id="ticker" placeholder="AAPL" />

<label>Account Size ($):</label>
<input id="accountSize" type="number" placeholder="1000" />

<label>Expiration:</label>
<select id="expiry">
  <option value="weekly">Weekly</option>
  <option value="biweekly">Bi-Weekly</option>
</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

</div>

<script>

const API_KEY = "demo"; // Replace with your real key for better reliability

async function getHistorical(ticker) {
  try {
    const response = await fetch(
      `https://financialmodelingprep.com/api/v3/historical-price-full/${ticker}?serietype=line&apikey=${API_KEY}`
    );
    const data = await response.json();
    return data.historical;
  } catch {
    return null;
  }
}

async function analyze() {

  const ticker = document.getElementById("ticker").value.toUpperCase();
  const account = parseFloat(document.getElementById("accountSize").value);
  const expiry = document.getElementById("expiry").value;
  const result = document.getElementById("result");

  if (!ticker || !account) {
    result.innerHTML = "Enter ticker and account size.";
    return;
  }

  result.innerHTML = "Analyzing market structure...";

  const history = await getHistorical(ticker);

  if (!history || history.length < 25) {
    result.innerHTML = "<p class='warning'>Live data unavailable.</p>";
    return;
  }

  const closes = history.slice(0, 25).map(d => d.close);

  const currentPrice = closes[0];

  const ma20 = closes.slice(0, 20).reduce((a,b)=>a+b,0) / 20;

  const momentum5 = ((closes[0] - closes[5]) / closes[5]) * 100;

  const trendUp = currentPrice > ma20;
  const strongMomentum = Math.abs(momentum5) > 2;

  let bias = "WAIT";
  let score = 50;

  if (trendUp && momentum5 > 0) {
    bias = "CALL";
    score += 25;
  }

  if (!trendUp && momentum5 < 0) {
    bias = "PUT";
    score += 25;
  }

  if (strongMomentum) score += 15;

  if (score > 100) score = 100;

  let confidence;
  if (score >= 80) confidence = "High";
  else if (score >= 65) confidence = "Moderate";
  else if (score >= 50) confidence = "Low";
  else confidence = "Very Low";

  let recommendation;
  if (score >= 80)
      recommendation = `Strong ${bias}`;
  else if (score >= 65)
      recommendation = `${bias} — Acceptable`;
  else
      recommendation = "Wait for Better Setup";

  const movePercent = expiry === "weekly" ? 0.04 : 0.07;
  const expectedMove = currentPrice * movePercent;

  const strike = bias === "CALL"
      ? currentPrice + 2
      : currentPrice - 2;

  result.innerHTML = `
      <h2>${ticker}</h2>
      <p>Price: $${currentPrice.toFixed(2)}</p>
      <hr>
      <p>20 Day MA: $${ma20.toFixed(2)}</p>
      <p>5 Day Momentum: ${momentum5.toFixed(2)}%</p>
      <hr>
      <p><b>Bias:</b> 
        <span class="${bias === "CALL" ? "bullish" : bias === "PUT" ? "bearish" : "warning"}">
        ${bias}
        </span>
      </p>
      <p><b>Suggested Strike:</b> $${strike.toFixed(2)}</p>
      <p><b>Expected Move:</b> ±$${expectedMove.toFixed(2)}</p>
      <hr>
      <p><b>Trade Quality Score:</b> ${score}/100</p>
      <p><b>Confidence:</b> ${confidence}</p>
      <p class="strong"><b>Recommendation:</b> ${recommendation}</p>
  `;
}

</script>

</body>
</html>
