<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Trade Prompter Pro</title>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial;
  padding: 40px;
}

h1 {
  color: #00ffcc;
}

input, select {
  padding: 8px;
  margin: 5px;
  font-size: 16px;
}

button {
  padding: 10px 14px;
  background: #00ffcc;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

#result {
  margin-top: 25px;
  padding: 20px;
  background: #1a1a1a;
  border-radius: 8px;
}

.warning {
  color: orange;
  font-weight: bold;
}

.danger {
  color: red;
  font-weight: bold;
}

.bullish {
  color: lime;
  font-weight: bold;
}

.bearish {
  color: red;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>Trade Prompter Pro</h1>

<label>Ticker:</label>
<input id="ticker" placeholder="AAPL" />

<br><br>

<label>Account Size ($):</label>
<input id="accountSize" type="number" placeholder="1000" />

<br><br>

<label>Expiration Preference:</label>
<select id="expiry">
  <option value="weekly">Weekly (0-7 days)</option>
  <option value="biweekly">Bi-Weekly (7-14 days)</option>
</select>

<br><br>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

<script>

function analyze() {

  const ticker = document.getElementById("ticker").value.toUpperCase();
  const account = parseFloat(document.getElementById("accountSize").value);
  const expiry = document.getElementById("expiry").value;
  const result = document.getElementById("result");

  if (!ticker || !account) {
    result.innerHTML = "Please enter ticker and account size.";
    return;
  }

  // Simulated Stock Price (Stable — No API)
  const price = 100 + Math.random() * 50;

  // Expected Move %
  const movePercent = expiry === "weekly" ? 0.04 : 0.07;

  const expectedMove = price * movePercent;
  const upperRange = price + expectedMove;
  const lowerRange = price - expectedMove;

  // Bias Simulation
  const bias = price % 2 === 0 ? "Bullish" : "Bearish";

  // Strike suggestion (1–2 strikes OTM style)
  const suggestedStrike = bias === "Bullish"
      ? price + 2
      : price - 2;

  // Option pricing simulation
  const optionCost = price * 0.05;

  // Breakeven
  const breakeven = bias === "Bullish"
      ? suggestedStrike + optionCost
      : suggestedStrike - optionCost;

  const percentMoveNeeded = Math.abs((breakeven - price) / price * 100);

  // Risk sizing
  const maxRisk = account * 0.10;

  let riskWarning = "";
  if (optionCost > maxRisk) {
      riskWarning = "<p class='danger'>⚠ Position exceeds 10% account risk.</p>";
  }

  let strikeWarning = "";
  if (bias === "Bullish" && suggestedStrike > upperRange) {
      strikeWarning = "<p class='warning'>⚠ Strike outside expected move range.</p>";
  }

  if (bias === "Bearish" && suggestedStrike < lowerRange) {
      strikeWarning = "<p class='warning'>⚠ Strike outside expected move range.</p>";
  }

  result.innerHTML = `
      <h2>${ticker}</h2>

      <p>Current Price: $${price.toFixed(2)}</p>
      <p>Bias: <span class="${bias === "Bullish" ? "bullish" : "bearish"}">${bias}</span></p>

      <hr>

      <p><b>Expected Move (${expiry}):</b> ±$${expectedMove.toFixed(2)}</p>
      <p>Projected Range: $${lowerRange.toFixed(2)} - $${upperRange.toFixed(2)}</p>

      <hr>

      <p><b>Suggested Strike:</b> $${suggestedStrike.toFixed(2)}</p>
      <p><b>Estimated Option Cost:</b> $${optionCost.toFixed(2)}</p>
      <p><b>Breakeven:</b> $${breakeven.toFixed(2)}</p>
      <p><b>% Move Required:</b> ${percentMoveNeeded.toFixed(2)}%</p>

      ${strikeWarning}
      ${riskWarning}
  `;
}

</script>

</body>
</html>
