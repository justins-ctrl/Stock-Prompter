<!DOCTYPE html>
<html>
<head>

<title>AI Options Terminal V19</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0b0f19;
color:white;
padding:16px;
}

.container{
max-width:720px;
margin:auto;
}

h2{
text-align:center;
}

input{
width:100%;
padding:16px;
font-size:18px;
border-radius:10px;
border:none;
margin-top:10px;
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
background:#2f8cff;
color:white;
margin-top:10px;
}

.card{
background:#121826;
padding:14px;
border-radius:10px;
margin-top:14px;
}

.best{
background:#1c2c48;
}

.setup{
background:#1a2e3d;
}

table{
width:100%;
margin-top:10px;
}

td{
padding:6px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Options Terminal V19</h2>

<input id="ticker" placeholder="Enter Stock Ticker">

<button onclick="scan()">Run AI Analysis</button>

<button onclick="marketScan()">Scan Top Opportunities</button>

<div id="output"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3"

const watchlist=[
"SPY",
"QQQ",
"AAPL",
"NVDA",
"TSLA",
"AMD",
"META",
"MSFT",
"AMZN",
"GOOGL"
]

let output=document.getElementById("output")

async function getData(symbol){

let url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`

let r=await fetch(url)
let d=await r.json()

let s=d["Time Series (Daily)"]

if(!s) return null

let closes=Object.values(s)
.slice(0,60)
.map(x=>parseFloat(x["4. close"]))

return closes

}

function sma(p,n){
let s=0
for(let i=0;i<n;i++) s+=p[i]
return s/n
}

function rsi(p){

let g=0
let l=0

for(let i=1;i<p.length;i++){

let d=p[i]-p[i-1]

if(d>0) g+=d
else l+=Math.abs(d)

}

let rs=g/l

return 100-(100/(1+rs))

}

function macd(p){
return sma(p,12)-sma(p,26)
}

function vwap(p){
let s=0
for(let x of p) s+=x
return s/p.length
}

function analyze(prices){

let price=prices[0]

let r=rsi(prices)
let s=sma(prices,20)
let m=macd(prices)
let v=vwap(prices)

let bias="Neutral"

if(price>s && r>55 && m>0) bias="Bullish"
if(price<s && r<45 && m<0) bias="Bearish"

let signal="WAIT"

if(bias=="Bullish") signal="BUY CALL"
if(bias=="Bearish") signal="BUY PUT"

let score=50

if(bias!="Neutral") score+=15
if(r>60||r<40) score+=10
if(m>0) score+=10
if(price>v) score+=10

let confidence="Medium"
if(score>80) confidence="High"
if(score<60) confidence="Low"

let expectedMove=(price*0.04).toFixed(2)

let callStrike=(price*1.02).toFixed(2)
let putStrike=(price*0.98).toFixed(2)

let entry="Wait Pullback"
if(price>v && bias=="Bullish") entry="Pullback near VWAP"
if(price<v && bias=="Bearish") entry="Breakdown Momentum"

let expiration="3-7 Days"

let pop=Math.min(90,score)

return{

price:price.toFixed(2),
signal,
score,
confidence,
expectedMove,
callStrike,
putStrike,
entry,
expiration,
pop

}

}

async function scan(){

let symbol=document.getElementById("ticker").value.toUpperCase()

output.innerHTML="Running AI analysis..."

let prices=await getData(symbol)

if(!prices){

output.innerHTML="Data unavailable or API limit reached"

return

}

let a=analyze(prices)

output.innerHTML=`

<div class="card setup">

<b>AI TRADE SETUP</b><br><br>

Ticker: ${symbol}<br>
Direction: ${a.signal}<br>
Confidence: ${a.confidence}<br>
Strike: ${a.signal=="BUY CALL"?a.callStrike:a.putStrike}<br>
Expiration: ${a.expiration}<br>
Entry: ${a.entry}<br>
Expected Move: $${a.expectedMove}<br>
Probability Profit: ${a.pop}%<br>

</div>

`

}

async function marketScan(){

output.innerHTML="<div class='card'>Scanning opportunities...</div>"

let results=[]

for(let s of watchlist){

let prices=await getData(s)

if(!prices) continue

let a=analyze(prices)

results.push({symbol:s,...a})

results.sort((a,b)=>b.score-a.score)

renderResults(results.slice(0,2))

await new Promise(r=>setTimeout(r,12000))

}

}

function renderResults(results){

let html=`<div class="card best">

<b>TOP OPPORTUNITIES</b><br><br>`

for(let r of results){

html+=`

${r.symbol} — ${r.signal} — Score ${r.score}<br>`

}

html+=`</div>`

output.innerHTML=html

}

</script>

</body>
</html>
