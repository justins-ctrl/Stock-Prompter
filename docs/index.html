<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Trade Prompter Pro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Trade Prompter Pro</h1>

<input id="tickerInput" placeholder="Enter Ticker (ex: AAPL)" />
<button onclick="analyzeStock()">Analyze</button>

<div id="result"></div>

<script>

const WORKER_URL = "https://patient-boat-e680.mftgngkpk4.workers.dev/";

async function analyzeStock() {

  const ticker = document.getElementById("tickerInput").value.toUpperCase();
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "Scanning...";

  try {

    const response = await fetch(`${WORKER_URL}?symbol=${ticker}`);
    const data = await response.json();

    if (data.error) {
      resultDiv.innerHTML = "Error: " + data.error;
      return;
    }

    let biasColor = "gray";
    if (data.bias === "Bullish") biasColor = "green";
    if (data.bias === "Bearish") biasColor = "red";

    resultDiv.innerHTML = `
      <h2>${data.symbol}</h2>
      <p>Price: $${data.price}</p>
      <p>Change: ${data.change.toFixed(2)}%</p>
      <p style="color:${biasColor}; font-weight:bold;">
        Bias: ${data.bias}
      </p>
      <hr>
      <p><b>Options Suggestion:</b></p>
      <p>
        ${data.bias === "Bullish" ? 
          "Consider Weekly Call slightly OTM" :
          data.bias === "Bearish" ?
          "Consider Weekly Put slightly OTM" :
          "Wait for stronger move before entry"}
      </p>
    `;

  } catch (err) {
    resultDiv.innerHTML = "Connection error.";
  }
}

</script>

</body>
</html>
