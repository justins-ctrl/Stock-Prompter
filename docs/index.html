<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Trade Prompter Pro</title>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial;
  padding: 40px;
}

h1 {
  color: #00ffcc;
}

input, select {
  padding: 8px;
  margin: 5px;
  font-size: 16px;
}

button {
  padding: 8px 12px;
  background: #00ffcc;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

#result {
  margin-top: 20px;
  padding: 15px;
  background: #1a1a1a;
}
</style>
</head>
<body>

<h1>Trade Prompter</h1>

<label>Ticker:</label>
<input id="ticker" placeholder="AAPL" />

<label>Account Size ($):</label>
<input id="accountSize" type="number" placeholder="1000" />

<label>Expiration Preference:</label>
<select id="expiry">
  <option value="weekly">Weekly (0-7 days)</option>
  <option value="biweekly">Bi-Weekly (7-14 days)</option>
</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

<script>

function analyze() {

  const ticker = document.getElementById("ticker").value.toUpperCase();
  const account = parseFloat(document.getElementById("accountSize").value);
  const expiry = document.getElementById("expiry").value;

  const result = document.getElementById("result");

  if (!ticker || !account) {
    result.innerHTML = "Enter ticker and account size.";
    return;
  }

  // Simulated pricing model (stable — no APIs)
  const simulatedPrice = 100 + Math.random() * 50;
  const optionCost = simulatedPrice * 0.05;

  const maxRisk = account * 0.10;

  let bias = simulatedPrice % 2 === 0 ? "Bullish" : "Bearish";

  let strikeSuggestion = bias === "Bullish"
    ? (simulatedPrice + 2).toFixed(2)
    : (simulatedPrice - 2).toFixed(2);

  let warning = "";

  if (optionCost > maxRisk) {
    warning = "<p style='color:red;'>⚠️ Position too large for account size.</p>";
  }

  result.innerHTML = `
    <h2>${ticker}</h2>
    <p>Simulated Price: $${simulatedPrice.toFixed(2)}</p>
    <p>Bias: <b style="color:${bias === "Bullish" ? "lime" : "red"}">${bias}</b></p>
    <p>Suggested ${expiry} Strike: $${strikeSuggestion}</p>
    <p>Estimated Option Cost: $${optionCost.toFixed(2)}</p>
    ${warning}
  `;
}

</script>

</body>
</html>
