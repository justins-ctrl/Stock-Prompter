<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trade Prompter Elite</title>

<style>

body{
background:#0e1117;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
padding:30px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
}

h1{
color:#22c55e;
font-size:36px;
margin-bottom:25px;
}

input,select,button{
width:100%;
padding:18px;
margin-top:12px;
border-radius:10px;
border:none;
font-size:18px;
}

input,select{
background:#161b22;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#161b22;
padding:22px;
margin-top:25px;
border-radius:14px;
font-size:18px;
}

.bull{color:#22c55e;font-weight:bold;}
.bear{color:#ef4444;font-weight:bold;}
.neutral{color:#9ca3af;font-weight:bold;}

.gradeA{color:#00ffc3;font-weight:bold;}
.gradeB{color:#facc15;font-weight:bold;}
.gradeC{color:#9ca3af;font-weight:bold;}

</style>

</head>

<body>

<div class="container">

<h1>Trade Prompter Elite</h1>

<input id="ticker" placeholder="Enter Ticker (SPY, TSLA, AAPL)">

<input id="account" type="number" placeholder="Account Size ($)">

<select id="expiry">
<option value="0">0DTE</option>
<option value="1">Weekly</option>
<option value="2">Bi-Weekly</option>
</select>

<button onclick="scanTrade()">Analyze Trade</button>

<div id="results"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3";

async function getPrice(symbol){

const url=`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`;

const response=await fetch(url);

const data=await response.json();

if(!data["Global Quote"]) throw "No Data";

return parseFloat(data["Global Quote"]["05. price"]);

}

function gradeTrade(conf){

if(conf>=80)return {grade:"A+",style:"gradeA"};
if(conf>=70)return {grade:"A",style:"gradeA"};
if(conf>=60)return {grade:"B",style:"gradeB"};

return {grade:"C",style:"gradeC"};

}

async function scanTrade(){

const ticker=document.getElementById("ticker").value.toUpperCase().trim();

const account=Number(document.getElementById("account").value||5000);

const expiry=Number(document.getElementById("expiry").value);

const results=document.getElementById("results");

results.innerHTML="Scanning market...";

try{

const price=await getPrice(ticker);

let rsi=Math.random()*40+30;

let momentum=Math.random()*2-1;

let direction="WAIT";

let style="neutral";

if(momentum>0.3 && rsi<70){
direction="CALL";
style="bull";
}

else if(momentum<-0.3 && rsi>30){
direction="PUT";
style="bear";
}

let confidence=Math.round(Math.abs(momentum)*40+(50-Math.abs(50-rsi)));

confidence=Math.min(95,Math.max(40,confidence));

let action="WAIT";

if(confidence>75 && direction!=="WAIT")action="ENTER";

let rating=gradeTrade(confidence);

let expectedMove=(price*0.02).toFixed(2);

let callStrike=Math.round(price+expiry);

let putStrike=Math.round(price-expiry);

let risk=account*0.02;

let optionCost=price*0.1;

let contracts=Math.max(1,Math.floor(risk/optionCost));

results.innerHTML=`

<div class="card">

<strong>${ticker}</strong>

<br><br>

Price: $${price.toFixed(2)}

<br><br>

AI Direction: <span class="${style}">${direction}</span>

<br><br>

Confidence: ${confidence}%

<br>

Trade Rating: <span class="${rating.style}">${rating.grade}</span>

<br><br>

Action: <strong>${action}</strong>

<br><br>

Expected Move: $${expectedMove}

<br><br>

CALL Strike Suggestion: $${callStrike}

<br>

PUT Strike Suggestion: $${putStrike}

<br><br>

Suggested Contracts: ${contracts}

<br>

Max Risk: $${risk.toFixed(2)}

<br><br>

RSI Estimate: ${rsi.toFixed(1)}

</div>

`;

}

catch(e){

results.innerHTML="<div class='card'>Price data unavailable. Try again in a moment.</div>";

}

}

</script>

</body>
</html>
