<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Prompter Pro</title>

<style>
body {
  background: #111;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 95%;
  max-width: 900px;
  padding: 40px;
}

h1 {
  text-align: center;
  color: #00ffcc;
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 6px;
  border: none;
  box-sizing: border-box;
}

button {
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

#result {
  margin-top: 30px;
  padding: 25px;
  background: #1a1a1a;
  border-radius: 10px;
  font-size: 18px;
}

.bullish { color: lime; font-weight: bold; }
.bearish { color: red; font-weight: bold; }
.warning { color: orange; font-weight: bold; }
.strong { color: #00ffcc; font-weight: bold; }
</style>
</head>
<body>

<div class="container">

<h1>Trade Prompter Pro</h1>

<label>Ticker Symbol:</label>
<input id="ticker" placeholder="AAPL" />

<label>Account Size ($):</label>
<input id="accountSize" type="number" placeholder="1000" />

<label>Expiration:</label>
<select id="expiry">
  <option value="weekly">Weekly</option>
  <option value="biweekly">Bi-Weekly</option>
</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

</div>

<script>

async function getPrice(ticker) {
  try {
    const response = await fetch(
      `https://financialmodelingprep.com/api/v3/quote/${ticker}?apikey=demo`
    );
    const data = await response.json();
    if (data && data.length > 0) {
      return data[0].price;
    }
  } catch (e) {}
  return null;
}

function simulatePrice() {
  return 100 + Math.random() * 50;
}

async function analyze() {

  const ticker = document.getElementById("ticker").value.toUpperCase();
  const account = parseFloat(document.getElementById("accountSize").value);
  const expiry = document.getElementById("expiry").value;
  const result = document.getElementById("result");

  if (!ticker || !account) {
    result.innerHTML = "Enter ticker and account size.";
    return;
  }

  result.innerHTML = "Fetching price...";

  let price = await getPrice(ticker);
  if (!price) {
    price = simulatePrice();
    result.innerHTML = "<p class='warning'>Live data unavailable. Using simulator.</p>";
  }

  const movePercent = expiry === "weekly" ? 0.04 : 0.07;
  const expectedMove = price * movePercent;

  const upperRange = price + expectedMove;
  const lowerRange = price - expectedMove;

  // Basic directional bias (placeholder logic)
  const bias = price % 2 === 0 ? "CALL" : "PUT";

  const strike = bias === "CALL" ? price + 2 : price - 2;
  const optionCost = price * 0.05;

  const breakeven = bias === "CALL"
      ? strike + optionCost
      : strike - optionCost;

  const percentMoveNeeded = Math.abs((breakeven - price) / price * 100);

  const positionSize = optionCost * 100;
  const riskPercent = (positionSize / account) * 100;

  // ----- SCORING ENGINE -----

  let score = 100;

  if (percentMoveNeeded > movePercent * 100) score -= 30;
  if (riskPercent > 10) score -= 20;
  if (Math.abs(strike - price) > expectedMove) score -= 15;

  if (score < 0) score = 0;

  let confidence;
  if (score >= 80) confidence = "High";
  else if (score >= 60) confidence = "Moderate";
  else if (score >= 40) confidence = "Low";
  else confidence = "Very Low";

  let recommendation;
  if (score >= 75)
      recommendation = `Strong ${bias}`;
  else if (score >= 55)
      recommendation = `${bias} — Acceptable`;
  else
      recommendation = "Wait for Better Setup";

  result.innerHTML += `
      <h2>${ticker}</h2>
      <p>Price: $${price.toFixed(2)}</p>

      <hr>

      <p><b>Expected Move:</b> ±$${expectedMove.toFixed(2)}</p>
      <p>Range: $${lowerRange.toFixed(2)} - $${upperRange.toFixed(2)}</p>

      <hr>

      <p><b>Trade Type:</b> 
        <span class="${bias === "CALL" ? "bullish" : "bearish"}">
        ${bias}
        </span>
      </p>

      <p><b>Suggested Strike:</b> $${strike.toFixed(2)}</p>
      <p><b>Breakeven:</b> $${breakeven.toFixed(2)}</p>
      <p><b>% Move Required:</b> ${percentMoveNeeded.toFixed(2)}%</p>
      <p><b>Account Risk:</b> ${riskPercent.toFixed(2)}%</p>

      <hr>

      <p><b>Trade Quality Score:</b> ${score}/100</p>
      <p><b>Confidence Level:</b> ${confidence}</p>
      <p class="strong"><b>Recommendation:</b> ${recommendation}</p>
  `;
}

</script>

</body>
</html>
