<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trade Prompter Elite</title>

<style>

body{
background:#0e1117;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:760px;
margin:auto;
}

h1{
color:#22c55e;
font-size:30px;
margin-bottom:20px;
}

button,input,select{
width:100%;
padding:16px;
margin-top:12px;
border-radius:10px;
border:none;
font-size:18px;
}

input,select{
background:#161b22;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
}

.card{
background:#161b22;
padding:22px;
margin-top:20px;
border-radius:14px;
font-size:18px;
}

.bull{color:#22c55e;font-weight:bold;}
.bear{color:#ef4444;font-weight:bold;}
.neutral{color:#9ca3af;font-weight:bold;}

.gradeA{color:#00ffc3;font-weight:bold;}
.gradeB{color:#facc15;font-weight:bold;}
.gradeC{color:#9ca3af;font-weight:bold;}

.entry{color:#60a5fa;font-weight:bold;}
.warn{color:#ff8c00;font-weight:bold;}

.scan{text-align:left;line-height:1.7}

</style>

</head>

<body>

<div class="container">

<h1>Trade Prompter Elite</h1>

<div id="tradeBoard"></div>

<button onclick="scanMarket()">Scan Options Heatmap</button>

<div id="scanner"></div>

<button onclick="scanFlow()">Scan Options Flow</button>

<div id="flow"></div>

<input id="ticker" placeholder="Ticker (SPY, NVDA, TSLA)">

<input id="account" type="number" placeholder="Account Size ($)">

<select id="expiry">
<option value="0">0DTE</option>
<option value="1">Weekly</option>
<option value="2">Bi-Weekly</option>
</select>

<button onclick="scanTrade()">Analyze Trade</button>

<div id="results"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3"

const watchlist=["SPY","QQQ","NVDA","TSLA","AAPL","AMD","META"]

async function getHistory(symbol){

const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`

const r=await fetch(url)
const data=await r.json()

const series=data["Time Series (Daily)"]

if(!series) throw "no data"

let prices=[]

for(let d in series){
prices.push(parseFloat(series[d]["4. close"]))
}

return prices.slice(0,60)

}

function average(arr){
return arr.reduce((a,b)=>a+b)/arr.length
}

function stdDev(arr){

let avg=average(arr)

let squareDiffs=arr.map(v=>Math.pow(v-avg,2))

return Math.sqrt(average(squareDiffs))

}

function grade(conf){

if(conf>=80)return{g:"A+",c:"gradeA"}
if(conf>=70)return{g:"A",c:"gradeA"}
if(conf>=60)return{g:"B",c:"gradeB"}

return{g:"C",c:"gradeC"}

}

function tradeDecision(direction,confidence){

if(confidence>75 && direction=="CALL") return "BUY CALL"
if(confidence>75 && direction=="PUT") return "BUY PUT"
if(confidence>60) return "WATCH"

return "WAIT"

}

function randomFlow(){

let strength=Math.floor(Math.random()*40)+60

let types=[
"CALL SWEEP",
"PUT SWEEP",
"UNUSUAL CALL VOLUME",
"UNUSUAL PUT VOLUME"
]

let type=types[Math.floor(Math.random()*types.length)]

return {type,strength}

}

async function scanFlow(){

let alerts=[]

for(let s of watchlist){

let flow=randomFlow()

alerts.push({symbol:s,flow})

}

alerts.sort((a,b)=>b.flow.strength-a.flow.strength)

let html="<div class='card scan'><strong>OPTIONS FLOW ALERTS</strong><br><br>"

for(let i=0;i<5;i++){

let a=alerts[i]

html+=`${a.symbol} — ${a.flow.type} — ${a.flow.strength}%<br>`

}

html+="</div>"

document.getElementById("flow").innerHTML=html

}

function generateHeatmap(){

let strength=Math.floor(Math.random()*40)+60
let type=Math.random()>0.5?"CALL FLOW":"PUT FLOW"

return {type,strength}

}

async function scanMarket(){

let setups=[]

for(let s of watchlist){

let flow=generateHeatmap()

setups.push({symbol:s,flow})

}

setups.sort((a,b)=>b.flow.strength-a.flow.strength)

let html="<div class='card scan'><strong>OPTIONS HEATMAP</strong><br><br>"

for(let i=0;i<5;i++){

let s=setups[i]

html+=`${i+1}. ${s.symbol} — ${s.flow.type} — ${s.flow.strength}%<br>`

}

html+="</div>"

document.getElementById("scanner").innerHTML=html

}

async function buildTradeBoard(){

let setups=[]

for(let s of watchlist){

try{

let prices=await getHistory(s)

let price=prices[0]

let ma20=average(prices.slice(0,20))
let ma50=average(prices.slice(0,50))

let direction="NEUTRAL"

if(price>ma20 && ma20>ma50) direction="CALL"
if(price<ma20 && ma20<ma50) direction="PUT"

let momentum=Math.abs(price-ma20)

let confidence=Math.min(95,Math.round(momentum/price*400+60))

setups.push({symbol:s,direction,confidence})

}catch{}

}

setups.sort((a,b)=>b.confidence-a.confidence)

let html="<div class='card scan'><strong>AI TOP TRADES TODAY</strong><br><br>"

for(let i=0;i<5;i++){

let s=setups[i]

html+=`${i+1}. ${s.symbol} — ${s.direction} — ${s.confidence}%<br>`

}

html+="</div>"

document.getElementById("tradeBoard").innerHTML=html

}

async function scanTrade(){

const ticker=document.getElementById("ticker").value.toUpperCase()
const account=Number(document.getElementById("account").value||5000)

const results=document.getElementById("results")

results.innerHTML="Analyzing trade..."

try{

let prices=await getHistory(ticker)

let price=prices[0]

let ma20=average(prices.slice(0,20))
let ma50=average(prices.slice(0,50))

let direction="NEUTRAL"
let style="neutral"

if(price>ma20 && ma20>ma50){direction="CALL";style="bull"}
if(price<ma20 && ma20<ma50){direction="PUT";style="bear"}

let momentum=Math.abs(price-ma20)

let confidence=Math.min(95,Math.round(momentum/price*400+60))

let probabilityITM=Math.round(confidence*0.75)

let momentumStrength=momentum>price*0.02?"Strong":"Moderate"

let trendDirection=ma20>ma50?"Bullish":"Bearish"

let volatility=stdDev(prices.slice(0,20))

let volState=volatility>price*0.02?"Expanding":"Stable"

let gammaPressure=momentum>price*0.03?"High":"Normal"

let premiumRisk=volatility>price*0.025?"High":"Medium"

let expectedMove=(price*0.02).toFixed(2)

let atm=Math.round(price)

let callStrike=Math.round(price+1)
let putStrike=Math.round(price-1)

let risk=account*0.02
let optionCost=price*0.1

let contracts=Math.max(1,Math.floor(risk/optionCost))

let rating=grade(confidence)

let decision=tradeDecision(direction,confidence)

let pullbackEntry=(price*0.995).toFixed(2)
let breakoutEntry=(price*1.005).toFixed(2)

results.innerHTML=

`<div class="card">

<strong>${ticker}</strong>

<br><br>

Market Bias: <span class="${style}">${direction}</span>

<br>

Trade Decision: <strong>${decision}</strong>

<br><br>

Confidence: ${confidence}%

<br>

Trade Rating: <span class="${rating.c}">${rating.g}</span>

<br><br>

Probability ITM: ${probabilityITM}%

<br>

Momentum: ${momentumStrength}

<br>

Trend: ${trendDirection}

<br><br>

Volatility: ${volState}

<br>

Gamma Pressure: ${gammaPressure}

<br>

Premium Risk: ${premiumRisk}

<br><br>

Expected Move: $${expectedMove}

<br><br>

ATM Strike: $${atm}

<br>

Best CALL Strike: $${callStrike}

<br>

Best PUT Strike: $${putStrike}

<br><br>

Suggested Contracts: ${contracts}

<br>

Max Risk: $${risk.toFixed(2)}

<br><br>

<div class="entry">

Entry Timing

<br>

Pullback Entry: $${pullbackEntry}

<br>

Breakout Entry: $${breakoutEntry}

</div>

</div>`

}

catch{

results.innerHTML="<div class='card'>API limit reached or ticker unavailable</div>"

}

}

buildTradeBoard()

</script>

</body>

</html>
