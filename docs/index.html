<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

input,select,button{

width:100%;
padding:14px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:16px;

}

button{
background:#00c896;
color:white;
font-weight:bold;
}

#result{
margin-top:20px;
padding:20px;
background:#1a1a1a;
border-radius:10px;
text-align:left;
}

.bullish{color:lime;font-weight:bold;}
.bearish{color:red;font-weight:bold;}
.warning{color:orange;font-weight:bold;}
.strong{color:#00ffcc;font-weight:bold;}

</style>

</head>

<body>

<div class="container">

<h1>Trade Prompter Elite</h1>

<input id="ticker" placeholder="Ticker (AAPL)">

<input id="accountSize" type="number" placeholder="Account Size">

<select id="expiry">
<option value="weekly">Weekly</option>
<option value="biweekly">Bi-Weekly</option>
</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3";

async function getDaily(ticker){

const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&outputsize=full&apikey=${API_KEY}`;

const res=await fetch(url);

const data=await res.json();

return data["Time Series (Daily)"];

}

function movingAverage(data,period){

let sum=0;

for(let i=0;i<period;i++){

sum+=data[i];

}

return sum/period;

}

function calculateRSI(closes,period=14){

let gains=0;
let losses=0;

for(let i=1;i<=period;i++){

const diff=closes[i-1]-closes[i];

if(diff>0) gains+=diff;
else losses-=diff;

}

const avgGain=gains/period;
const avgLoss=losses/period;

const rs=avgGain/avgLoss;

return 100-(100/(1+rs));

}

async function analyze(){

const ticker=document.getElementById("ticker").value.toUpperCase();

const account=document.getElementById("accountSize").value;

const expiry=document.getElementById("expiry").value;

const result=document.getElementById("result");

result.innerHTML="Analyzing market conditions...";

const daily=await getDaily(ticker);

if(!daily){

result.innerHTML="<span class='warning'>Invalid symbol or API limit.</span>";

return;

}

const dates=Object.keys(daily);

const closes=dates.slice(0,250).map(d=>parseFloat(daily[d]["4. close"]));

const price=closes[0];

const rsi=calculateRSI(closes);

const ma50=movingAverage(closes,50);

const ma200=movingAverage(closes,200);

let trend="Neutral";

if(ma50>ma200) trend="Bullish";

if(ma50<ma200) trend="Bearish";

let direction="WAIT";
let strike=0;
let probability=50;
let rating="B";
let entry="Wait";

if(rsi<35 && trend==="Bullish"){

direction="CALL";
strike=(price*1.02).toFixed(2);
probability=78;
rating="A+";
entry="Momentum Reversal";

}

else if(rsi>65 && trend==="Bearish"){

direction="PUT";
strike=(price*0.98).toFixed(2);
probability=78;
rating="A+";
entry="Momentum Reversal";

}

else if(rsi<40){

direction="CALL";
strike=(price*1.01).toFixed(2);
probability=65;
rating="B+";
entry="Possible Bounce";

}

else if(rsi>60){

direction="PUT";
strike=(price*0.99).toFixed(2);
probability=65;
rating="B+";
entry="Possible Reversal";

}

let positionSize=(account*0.02).toFixed(0);

result.innerHTML=

`
<div class="strong">Market Analysis</div>

Price: $${price.toFixed(2)} <br>
RSI: ${rsi.toFixed(1)} <br>
Trend: ${trend} <br>
50MA: ${ma50.toFixed(2)} <br>
200MA: ${ma200.toFixed(2)} <br><br>

<div class="${direction==="CALL"?"bullish":"bearish"}">

Trade Direction: ${direction}

</div>

<br>

Suggested Strike: $${strike} <br>
Expiration: ${expiry} <br><br>

Probability: ${probability}% <br>
Trade Rating: ${rating} <br>
Entry Signal: ${entry} <br><br>

Suggested Position Size: $${positionSize}

`;

}

</script>

</body>

</html>
