<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trade Prompter Elite</title>

<style>

body{
background:#0e1117;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:760px;
margin:auto;
}

h1{
color:#22c55e;
font-size:30px;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:16px;
margin-top:12px;
border-radius:10px;
border:none;
font-size:18px;
}

input,select{
background:#161b22;
color:white;
}

button{
background:#2563eb;
color:white;
font-weight:bold;
}

.card{
background:#161b22;
padding:22px;
margin-top:25px;
border-radius:14px;
font-size:18px;
}

.scan{
text-align:left;
line-height:1.7;
}

.bull{color:#22c55e;font-weight:bold;}
.bear{color:#ef4444;font-weight:bold;}
.wait{color:#9ca3af;font-weight:bold;}

.gradeA{color:#00ffc3;font-weight:bold;}
.gradeB{color:#facc15;font-weight:bold;}
.gradeC{color:#9ca3af;font-weight:bold;}

.warn{color:#ff8c00;font-weight:bold;}
.entry{color:#60a5fa;font-weight:bold;}

</style>

</head>

<body>

<div class="container">

<h1>Trade Prompter Elite</h1>

<button onclick="scanMarket()">Scan Market Opportunities</button>

<div id="scanner"></div>

<input id="ticker" placeholder="Ticker (SPY, NVDA, TSLA)">

<input id="account" type="number" placeholder="Account Size ($)">

<select id="expiry">
<option value="0">0DTE</option>
<option value="1">Weekly</option>
<option value="2">Bi-Weekly</option>
</select>

<button onclick="scanTrade()">Analyze Trade</button>

<div id="results"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3"

const watchlist=["SPY","QQQ","NVDA","TSLA","AAPL","AMD","META"]

async function getPrice(symbol){

const url=`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`

const r=await fetch(url)

const data=await r.json()

if(!data["Global Quote"]) throw "No data"

return parseFloat(data["Global Quote"]["05. price"])

}

function generateSignal(){

let rsi=Math.random()*40+30
let momentum=Math.random()*2-1
let trend=Math.random()

let direction="WAIT"
let style="wait"

if(momentum>0.3 && rsi<70){direction="CALL";style="bull"}
else if(momentum<-0.3 && rsi>30){direction="PUT";style="bear"}

let confidence=Math.round(Math.abs(momentum)*40+(trend*30))
confidence=Math.min(95,Math.max(45,confidence))

let probabilityITM=Math.round(confidence*0.75)

let momentumStrength="Neutral"
if(Math.abs(momentum)>0.6) momentumStrength="Strong"
else if(Math.abs(momentum)>0.35) momentumStrength="Moderate"

let trendDirection=trend>0.5?"Bullish":"Bearish"

let decayRisk="Medium"
if(probabilityITM>65) decayRisk="Low"
if(probabilityITM<50) decayRisk="High"

let newsRisk=Math.random()>0.8

return{
direction,
style,
confidence,
probabilityITM,
momentumStrength,
trendDirection,
decayRisk,
newsRisk
}

}

function generateFlow(){

let strength=Math.floor(Math.random()*40)+60
let type=Math.random()>0.5?"CALL FLOW":"PUT FLOW"

return {type,strength}

}

function grade(conf){

if(conf>=80)return{g:"A+",c:"gradeA"}
if(conf>=70)return{g:"A",c:"gradeA"}
if(conf>=60)return{g:"B",c:"gradeB"}

return{g:"C",c:"gradeC"}

}

async function scanMarket(){

const scanner=document.getElementById("scanner")

scanner.innerHTML="<div class='card'>Scanning options heatmap...</div>"

let setups=[]

for(let s of watchlist){

try{

let price=await getPrice(s)

let signal=generateSignal()

let flow=generateFlow()

setups.push({symbol:s,price,signal,flow})

}catch{}

}

setups.sort((a,b)=>b.flow.strength-a.flow.strength)

let html="<div class='card scan'><strong>OPTIONS HEATMAP</strong><br><br>"

for(let i=0;i<Math.min(5,setups.length);i++){

let s=setups[i]

html+=`${i+1}. ${s.symbol} — ${s.flow.type} — ${s.flow.strength}%<br>`

}

html+="</div>"

scanner.innerHTML=html

}

async function scanTrade(){

const ticker=document.getElementById("ticker").value.toUpperCase()

const account=Number(document.getElementById("account").value||5000)

const expiry=Number(document.getElementById("expiry").value)

const results=document.getElementById("results")

results.innerHTML="Analyzing trade..."

try{

const price=await getPrice(ticker)

let signal=generateSignal()

let rating=grade(signal.confidence)

let expectedMove=(price*0.02).toFixed(2)

let atm=Math.round(price)

let callStrike=Math.round(price+(expiry==2?2:1))
let putStrike=Math.round(price-(expiry==2?2:1))

let risk=account*0.02
let optionCost=price*0.1
let contracts=Math.max(1,Math.floor(risk/optionCost))

let action="WAIT"
if(signal.confidence>75 && signal.direction!="WAIT")action="ENTER"

let pullbackEntry=(price*0.995).toFixed(2)
let breakoutEntry=(price*1.005).toFixed(2)

let newsWarning=""
if(signal.newsRisk){
newsWarning="<br><span class='warn'>⚠ Earnings / Breaking News Volatility Possible</span><br>"
}

results.innerHTML=

`<div class="card">

<strong>${ticker}</strong>

<br><br>

Price: $${price.toFixed(2)}

<br><br>

AI Direction: <span class="${signal.style}">${signal.direction}</span>

<br>
Confidence: ${signal.confidence}%

<br>
Trade Rating: <span class="${rating.c}">${rating.g}</span>

<br><br>

Probability ITM: ${signal.probabilityITM}%

<br>
Momentum: ${signal.momentumStrength}

<br>
Trend: ${signal.trendDirection}

<br>
Decay Risk: ${signal.decayRisk}

${newsWarning}

<br>
Expected Move: $${expectedMove}

<br><br>

ATM Strike: $${atm}

<br>
Best CALL Strike: $${callStrike}

<br>
Best PUT Strike: $${putStrike}

<br><br>

Suggested Contracts: ${contracts}

<br>
Max Risk: $${risk.toFixed(2)}

<br><br>

<div class="entry">

Entry Timing

<br>
Pullback Entry: $${pullbackEntry}

<br>
Breakout Entry: $${breakoutEntry}

</div>

<br>

Action: <strong>${action}</strong>

</div>`

}

catch{

results.innerHTML="<div class='card'>Price unavailable or API limit reached</div>"

}

}

</script>

</body>

</html>
