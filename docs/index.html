<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Prompter Elite</title>
<style>
body{
background:#0b0b0b;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#00ffc3;
font-size:36px;
}

.container{
max-width:600px;
margin:auto;
}

input,select,button{
width:100%;
padding:18px;
margin:10px 0;
border-radius:12px;
border:none;
font-size:18px;
}

button{
background:#00ffc3;
font-weight:bold;
}

.result{
background:#111;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.bullish{color:#22c55e;font-weight:bold;}
.bearish{color:#ef4444;font-weight:bold;}
.neutral{color:#9ca3af;font-weight:bold;}
.strong{color:#00ffc3;font-weight:bold;}
.aplus{color:#ffd700;font-weight:bold;}
.warning{color:orange;}
</style>
</head>
<body>
<div class="container">
<h1>Trade Prompter Elite</h1>
<input id="ticker" placeholder="Ticker (AAPL)">
<input id="accountSize" type="number" placeholder="Account Size ($)">
<select id="expiry">
<option value="0dte">0DTE</option>
<option value="weekly">Weekly</option>
<option value="biweekly">Bi-Weekly</option>
</select>
<div id="result"></div>
</div>
<script>

const API_KEY="PASTE_YOUR_ALPHA_KEY";

async function getData(symbol){

const url=
`https://www.alphavantage.co/query?function=TIME_SERIES_INTRADAY&symbol=${symbol}&interval=5min&apikey=${API_KEY}`;

const res=await fetch(url);
const data=await res.json();

const series=data["Time Series (5min)"];

const prices=[];
const volume=[];

for(const t in series){

prices.push(parseFloat(series[t]["4. close"]));
volume.push(parseFloat(series[t]["5. volume"]));

}

return {prices,volume};

}

function calculateRSI(prices){

let gains=0;
let losses=0;

for(let i=1;i<14;i++){

const diff=prices[i]-prices[i-1];

if(diff>0)gains+=diff;
else losses+=Math.abs(diff);

}

const rs=gains/(losses||1);

return 100-(100/(1+rs));

}

function gradeTrade(score){

if(score>80)return "A+";
if(score>70)return "A";
if(score>60)return "B";
return "C";

}

async function analyze(){

const ticker=document.getElementById("ticker").value.toUpperCase();
const account=document.getElementById("accountSize").value;
const expiry=document.getElementById("expiry").value;

const result=document.getElementById("result");

result.innerHTML="Scanning market...";

try{

const {prices,volume}=await getData(ticker);

const current=prices[0];
const open=prices[prices.length-1];

const change=((current-open)/open)*100;

const rsi=calculateRSI(prices);

const avgVol=volume.reduce((a,b)=>a+b)/volume.length;
const volSpike=volume[0]>avgVol*1.5;

let direction="NEUTRAL";
let cls="neutral";

if(change>0.4 && rsi<70){
direction="CALL";
cls="bullish";
}

if(change<-0.4 && rsi>30){
direction="PUT";
cls="bearish";
}

let confidence=Math.abs(change)*40;

if(volSpike)confidence+=20;

confidence+=50-Math.abs(50-rsi);

confidence=Math.min(100,Math.round(confidence));

const rating=gradeTrade(confidence);

let action="WAIT";

if(confidence>75 && direction!=="NEUTRAL")action="ENTER";

const move=(current*0.02).toFixed(2);

let callStrike;
let putStrike;

if(expiry==="0dte"){
callStrike=Math.round(current);
putStrike=Math.round(current);
}

if(expiry==="weekly"){
callStrike=Math.round(current+1);
putStrike=Math.round(current-1);
}

if(expiry==="biweekly"){
callStrike=Math.round(current+2);
putStrike=Math.round(current-2);
}

const risk=account*0.02;

const contracts=Math.floor(risk/(current*0.1));

result.innerHTML=

`<div class="result">

<h2>${ticker}</h2>

Price: $${current.toFixed(2)}

<br><br>

AI Direction: <span class="${cls}">${direction}</span>

<br>

Confidence: ${confidence}%

<br>

Trade Rating: <span class="aplus">${rating}</span>

<br><br>

Action: <span class="strong">${action}</span>

<br><br>

Expected Move: $${move}

<br><br>

CALL Strike: $${callStrike}

<br>

PUT Strike: $${putStrike}

<br><br>

Suggested Contracts: ${contracts}

<br>

Risk Per Trade: $${risk.toFixed(2)}

<br>

RSI: ${rsi.toFixed(1)}

<br>

Volume Spike: ${volSpike ? "Yes" : "No"}

</div>`;

}

catch{

result.innerHTML="<div class='warning'>Data unavailable or API limit reached</div>";

}

}

</script>
</body>
</html>
:::
