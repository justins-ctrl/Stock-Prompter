<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trade Prompter Elite</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

h1{
color:#00ffc3;
font-size:36px;
}

.container{
max-width:500px;
margin:auto;
}

input,select,button{
width:100%;
padding:18px;
margin:10px 0;
border-radius:12px;
border:none;
font-size:18px;
}

button{
background:#00ffc3;
font-weight:bold;
}

.result{
background:#111;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.bullish{color:lime;font-weight:bold;}
.bearish{color:red;font-weight:bold;}
.warning{color:orange;font-weight:bold;}
.strong{color:#00ffc3;font-weight:bold;}
.aplus{color:#ffd700;font-weight:bold;}

</style>
</head>

<body>

<div class="container">

<h1>Trade Prompter Elite</h1>

<input id="ticker" placeholder="Ticker (AAPL)">
<input id="accountSize" type="number" placeholder="Account Size ($)">

<select id="expiry">
<option value="0dte">0DTE</option>
<option value="weekly">Weekly</option>
<option value="biweekly">Bi-Weekly</option>
</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

</div>

<script>

const API_KEY = "PASTE_YOUR_ALPHA_KEY_HERE";

async function getPrice(symbol){

const url =
`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`;

const res = await fetch(url);
const data = await res.json();

return parseFloat(data["Global Quote"]["05. price"]);

}

function gradeTrade(score){

if(score>80)return "A+";
if(score>70)return "A";
if(score>60)return "B";
return "C";

}

async function analyze(){

const ticker=document.getElementById("ticker").value.toUpperCase();
const account=document.getElementById("accountSize").value;
const expiry=document.getElementById("expiry").value;

const result=document.getElementById("result");

result.innerHTML="Analyzing...";

try{

const price=await getPrice(ticker);

if(!price){
result.innerHTML="<div class='warning'>Invalid symbol or API limit</div>";
return;
}

const move=(price*0.02).toFixed(2);

let callStrike;
let putStrike;

if(expiry==="0dte"){
callStrike=Math.round(price);
putStrike=Math.round(price);
}

if(expiry==="weekly"){
callStrike=Math.round(price+1);
putStrike=Math.round(price-1);
}

if(expiry==="biweekly"){
callStrike=Math.round(price+2);
putStrike=Math.round(price-2);
}

const confidence=Math.floor(Math.random()*25)+60;

const rating=gradeTrade(confidence);

let entry="WAIT";

if(confidence>75)entry="ENTER";

const risk=account*0.02;

const contracts=Math.floor(risk/(price*0.1));

result.innerHTML=

`<div class="result">

<h2>${ticker} Analysis</h2>

Price: $${price}

<br><br>

Expected Move: $${move}

<br><br>

<div class="bullish">

CALL IDEA<br>
Strike: $${callStrike}

</div>

<br>

<div class="bearish">

PUT IDEA<br>
Strike: $${putStrike}

</div>

<br><br>

Confidence: ${confidence}%

<br>

Rating: <span class="aplus">${rating}</span>

<br><br>

Entry Signal: <span class="strong">${entry}</span>

<br><br>

Suggested Contracts: ${contracts}

<br>

Risk Per Trade: $${risk.toFixed(2)}

</div>`;

}

catch{

result.innerHTML="<div class='warning'>Data unavailable</div>";

}

}

</script>

</body>
</html>
