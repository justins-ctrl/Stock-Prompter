<!DOCTYPE html>
<html>
<head>

<title>Trade Prompter Elite</title>

<style>

body{
font-family:Arial;
background:#0d0d0d;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
}

input,select,button{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:18px;
}

button{
background:#19c37d;
color:white;
font-weight:bold;
}

.result{
background:#1a1a1a;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.bullish{color:#00ff9c;font-weight:bold;}
.bearish{color:#ff4d4d;font-weight:bold;}
.warning{color:orange;font-weight:bold;}

</style>

</head>

<body>

<div class="container">

<h1>Trade Prompter Elite</h1>

<input id="ticker" placeholder="Ticker (AAPL)">
<input id="accountSize" type="number" placeholder="Account Size ($)">

<select id="expiry">
<option value="weekly">Weekly</option>
<option value="biweekly">Bi-Weekly</option>
</select>

<button onclick="analyze()">Analyze Trade</button>

<div id="result"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3";

async function getDaily(ticker){

const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&apikey=${API_KEY}`;

const res=await fetch(url);
const data=await res.json();

if(data["Note"]) return {error:"API limit reached. Wait 60 seconds."};
if(data["Error Message"]) return {error:"Invalid ticker symbol."};
if(!data["Time Series (Daily)"]) return {error:"No market data returned."};

return data["Time Series (Daily)"];

}

function calculateRSI(closes,period=14){

let gains=0;
let losses=0;

for(let i=1;i<=period;i++){

const diff=closes[i-1]-closes[i];

if(diff>0) gains+=diff;
else losses-=diff;

}

const avgGain=gains/period;
const avgLoss=losses/period;

const rs=avgGain/avgLoss;

return 100-(100/(1+rs));

}

function trendStrength(closes){

let up=0;
let down=0;

for(let i=1;i<10;i++){

if(closes[i-1]>closes[i]) up++;
else down++;

}

if(up>7) return "Strong Uptrend";
if(down>7) return "Strong Downtrend";

return "Sideways";

}

function suggestStrike(price,signal){

if(signal==="CALL") return (Math.round(price)+1);
if(signal==="PUT") return (Math.round(price)-1);

return Math.round(price);

}

function probabilityScore(rsi,trend){

let score=50;

if(rsi<35) score+=20;
if(rsi>65) score+=20;

if(trend==="Strong Uptrend") score+=15;
if(trend==="Strong Downtrend") score+=15;

return Math.min(score,95);

}

async function analyze(){

const ticker=document.getElementById("ticker").value.toUpperCase();
const account=document.getElementById("accountSize").value;

const result=document.getElementById("result");

result.innerHTML="Analyzing...";

const series=await getDaily(ticker);

if(series.error){

result.innerHTML=`<div class="warning">${series.error}</div>`;
return;

}

const dates=Object.keys(series);

let closes=[];

for(let i=0;i<20;i++){

closes.push(parseFloat(series[dates[i]]["4. close"]));

}

const price=closes[0];

const rsi=calculateRSI(closes);

const trend=trendStrength(closes);

let signal="NEUTRAL";

if(rsi<35) signal="CALL";
if(rsi>65) signal="PUT";

const strike=suggestStrike(price,signal);

const probability=probabilityScore(rsi,trend);

const risk=account*0.02;

result.innerHTML=`

<div class="result">

Price: $${price.toFixed(2)} <br><br>

RSI: ${rsi.toFixed(1)} <br>

Trend: ${trend} <br><br>

Signal: <span class="${signal==="CALL"?"bullish":"bearish"}">${signal}</span> <br><br>

Suggested Strike: $${strike} <br>

Max Position Risk: $${risk.toFixed(2)} <br><br>

Trade Probability: ${probability}% 

</div>

`;

}

</script>

</body>
</html>
