<!DOCTYPE html>
<html>
<head>
<title>AI Options Terminal V11</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#0c0f14;
color:white;
padding:20px;
}

.container{
max-width:520px;
margin:auto;
}

input,button{
width:100%;
padding:14px;
margin-top:10px;
font-size:18px;
border-radius:8px;
border:none;
}

button{
background:#1e90ff;
color:white;
}

.card{
background:#161b22;
padding:16px;
margin-top:14px;
border-radius:10px;
}

.good{color:#00e676}
.bad{color:#ff5252}
.neutral{color:#ffd54f}

table{
width:100%;
margin-top:10px;
}

td{
padding:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>AI Options Terminal V11</h2>

<input id="ticker" placeholder="Enter Ticker">

<button onclick="scan()">Run AI Scan</button>
<button onclick="marketScan()">Scan Market</button>

<div id="output"></div>

</div>

<script>

const API_KEY="OHCJWFQEFSXI8IJ3"

const watchlist=[
"SPY","QQQ","NVDA","TSLA",
"AAPL","AMD","META","NFLX","COIN"
]

async function getData(symbol){

let url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${API_KEY}`

let r=await fetch(url)
let d=await r.json()

let s=d["Time Series (Daily)"]

if(!s) return null

let closes=Object.values(s)
.slice(0,60)
.map(x=>parseFloat(x["4. close"]))

let price=closes[0]

let ma20=avg(closes.slice(0,20))
let ma50=avg(closes.slice(0,50))

let momentum=(price-closes[10])/closes[10]

let bias="Neutral"

if(price>ma20 && ma20>ma50) bias="Bullish"
if(price<ma20 && ma20<ma50) bias="Bearish"

let direction=
bias=="Bullish"?"CALL":
bias=="Bearish"?"PUT":"WAIT"

let confidence=Math.min(95,Math.abs(momentum*100)+50)

let probITM=Math.min(80,Math.abs(momentum*120)+40)

let pop=Math.min(90,probITM+8)

let volEngine=
Math.abs(momentum)>0.04?"High IV":
Math.abs(momentum)>0.025?"Rising IV":
"Normal IV"

let smartMoney=
Math.abs(momentum)>0.045?
"Institutional Momentum Detected":
"No unusual activity"

let rsi = calcRSI(closes)

let macd = calcMACD(closes)

let atr = calcATR(closes)

let regime="Choppy"

if(momentum>0.03) regime="Trending Up"
if(momentum<-0.03) regime="Trending Down"

let gammaPressure =
Math.abs(momentum)>0.05?
"Possible Gamma Squeeze Zone":
"Normal Dealer Positioning"

let nextDayProb =
50 + momentum*500

let tradeScore = Math.min(100,
(confidence*0.3) +
(probITM*0.25) +
(pop*0.25) +
((rsi/100)*20)
)

return{
symbol,
price,
bias,
direction,
confidence,
probITM,
pop,
volEngine,
smartMoney,
tradeScore,
rsi,
macd,
atr,
regime,
gammaPressure,
nextDayProb
}

}

async function scan(){

let ticker=document.getElementById("ticker").value.toUpperCase()

let d=await getData(ticker)

if(!d){
output.innerHTML="<div class='card'>API error</div>"
return
}

let atm=Math.round(d.price)

let otm1=d.direction=="CALL"?atm+2:atm-2
let otm2=d.direction=="CALL"?atm+4:atm-4

output.innerHTML=`

<div class="card">

<b>${d.symbol}</b><br>

Price: $${d.price.toFixed(2)}<br>

Market Bias:
<span class="${
d.bias=="Bullish"?"good":
d.bias=="Bearish"?"bad":"neutral"}">
${d.bias}
</span><br>

AI Direction: ${d.direction}<br>

Trade Decision:
<b>${
d.direction=="CALL"?"BUY CALL":
d.direction=="PUT"?"BUY PUT":"WAIT"}
</b><br>

Confidence: ${d.confidence.toFixed(0)}%<br>

Probability ITM: ${d.probITM.toFixed(0)}%<br>

Probability of Profit: ${d.pop.toFixed(0)}%

</div>

<div class="card">

<b>AI Trade Score</b><br>

${d.tradeScore.toFixed(0)}/100

</div>

<div class="card">

<b>Indicator Engine</b><br>

RSI: ${d.rsi.toFixed(0)}<br>
MACD: ${d.macd}<br>
ATR: ${d.atr.toFixed(2)}

</div>

<div class="card">

<b>Market Regime</b><br>

${d.regime}

</div>

<div class="card">

<b>Gamma Pressure</b><br>

${d.gammaPressure}

</div>

<div class="card">

<b>Next Day Direction Probability</b><br>

${d.nextDayProb.toFixed(0)}%

</div>

<div class="card">

Expected Move: ±$${(d.price*0.04).toFixed(2)}<br><br>

Smart Strikes<br>

ATM: ${atm}<br>
1 OTM: ${otm1}<br>
2 OTM: ${otm2}<br><br>

Suggested Expiration: 7–14 Days

</div>

<div class="card">

Execution Plan<br><br>

Pullback Entry: $${(d.price*0.99).toFixed(2)}<br>
Breakout Entry: $${(d.price*1.01).toFixed(2)}<br><br>

Profit Target: +50%<br>
Stop Loss: -30%

</div>

`

}

async function marketScan(){

output.innerHTML="<div class='card'>Scanning market...</div>"

let results=[]

for(let t of watchlist){

let d=await getData(t)

if(d) results.push(d)

}

results.sort((a,b)=>b.tradeScore-a.tradeScore)

let table=`

<div class="card">

<b>AI Daily Trade Board</b>

<table>

<tr>
<td>Rank</td>
<td>Ticker</td>
<td>Direction</td>
<td>Score</td>
<td>POP</td>
</tr>

`

results.forEach((r,i)=>{

table+=`

<tr>
<td>#${i+1}</td>
<td>${r.symbol}</td>
<td>${r.direction}</td>
<td>${r.tradeScore.toFixed(0)}</td>
<td>${r.pop.toFixed(0)}%</td>
</tr>

`

})

table+="</table></div>"

output.innerHTML=table

}

function avg(arr){
return arr.reduce((a,b)=>a+b,0)/arr.length
}

function calcRSI(data){
let gains=0
let losses=0
for(let i=1;i<14;i++){
let diff=data[i-1]-data[i]
if(diff>0) gains+=diff
else losses+=Math.abs(diff)
}
let rs=gains/losses
return 100-(100/(1+rs))
}

function calcMACD(data){
let short=avg(data.slice(0,12))
let long=avg(data.slice(0,26))
return short>long?"Bullish":"Bearish"
}

function calcATR(data){
let moves=[]
for(let i=1;i<14;i++){
moves.push(Math.abs(data[i]-data[i-1]))
}
return avg(moves)
}

</script>

</body>
</html>
